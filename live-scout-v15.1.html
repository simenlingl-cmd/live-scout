<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>⚡ Live Scout v15</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080808;--bg2:#0f0f0f;--bg3:#111;--bg4:#1a1a1a;
      --border:#1a1a1a;--border2:#2a2a2a;
      --text:#f0f0f0;--text2:#aaa;--text3:#666;--text4:#444;--text5:#333;
      --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;
    }
    .light-mode{
      --bg:#f5f5f5;--bg2:#ffffff;--bg3:#f0f0f0;--bg4:#e8e8e8;
      --border:#ddd;--border2:#ccc;
      --text:#111;--text2:#333;--text3:#555;--text4:#666;--text5:#888;
      --green:#16a34a;--amber:#d97706;--red:#dc2626;--blue:#2563eb;
    }
    body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh;transition:background .2s,color .2s}

    /* HEADER */
    #header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100}
    #header-inner{display:flex;align-items:center;justify-content:space-between;max-width:760px;margin:0 auto}
    #title{font-size:22px;font-weight:900;letter-spacing:.05em;line-height:1}
    #subtitle{font-size:11px;color:#444;font-family:'JetBrains Mono',monospace;margin-top:3px}
    #header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    #alert-badge{background:#22c55e;color:#000;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:900;display:none;animation:pulse 2s infinite}
    .hbtn{background:#1a1a1a;border:1px solid #2a2a2a;color:#888;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:11px;font-family:'JetBrains Mono',monospace;white-space:nowrap}
    .hbtn.on{background:#052010;border-color:#22c55e44;color:#22c55e}
    .hbtn.off{background:#1a0505;border-color:#ef444433;color:#ef4444}

    /* TABS */
    #tabs{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:99}
    #tabs-inner{display:flex;max-width:760px;margin:0 auto;padding:0 14px}
    .tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:#444;padding:10px 14px;cursor:pointer;font-size:13px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.05em;transition:all .15s}
    .tab-btn:hover{color:#888}
    .tab-btn.active{color:#f0f0f0;border-bottom-color:#22c55e}
    .tab-count{background:#1a1a1a;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:5px;color:#555;font-family:'JetBrains Mono',monospace}
    .tab-btn.active .tab-count{background:#052010;color:#22c55e}

    #view-live,#view-prematch,#view-history{display:none}
    #view-live{display:block}

    /* MAIN */
    #main,#prematch-wrap,#history-wrap{max-width:760px;margin:0 auto;padding:14px 14px 60px}

    /* FILTERS */
    .section-header{font-size:10px;color:var(--text4);font-family:'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin:12px 0 6px}
    .filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
    .filter-btn{background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:8px;padding:5px 11px;cursor:pointer;font-size:11px;font-family:'JetBrains Mono',monospace;transition:all .15s;white-space:nowrap}
    .filter-btn.active{background:var(--bg4);color:var(--text);border-color:var(--border2)}
    .filter-btn.active.col-red{color:#ef4444;border-color:#ef444455}
    .filter-btn.active.col-amber{color:#f59e0b;border-color:#f59e0b55}
    .filter-btn.active.col-blue{color:#3b82f6;border-color:#3b82f655}
    .filter-btn.active.col-green{color:#10b981;border-color:#10b98155}
    .filter-btn.active.col-lime{color:#22c55e;border-color:#22c55e55}
    .filter-btn.active.col-purple{color:#a855f7;border-color:#a855f755}
    .filter-btn.active.col-pink{color:#ec4899;border-color:#ec489955}
    .filter-btn.active.col-cyan{color:#06b6d4;border-color:#06b6d455}
    .filter-btn.active.col-orange{color:#f97316;border-color:#f9731655}
    .filter-btn.active.col-yellow{color:#facc15;border-color:#facc1555}

    #legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text4)}
    .legend-dot{width:8px;height:8px;border-radius:2px}

    /* MATCH CARD */
    .match-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .3s,box-shadow .3s}
    .match-card.has-alert{border-color:#22c55e33;box-shadow:0 0 18px #22c55e0a}
    .match-main{padding:16px 18px}
    .match-league{font-size:10px;color:var(--text4);margin-bottom:9px;font-family:'JetBrains Mono',monospace;display:flex;justify-content:space-between;align-items:center;gap:8px}
    .match-league-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .standings-toggle{cursor:pointer;color:#333;font-size:10px;padding:2px 7px;border:1px solid #1f1f1f;border-radius:4px;flex-shrink:0}
    .score-only-badge{font-size:9px;color:#2a2a2a;border:1px solid #1a1a1a;border-radius:3px;padding:1px 5px}
    .match-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .match-teams{flex:1}
    .match-home{font-size:15px;font-weight:700;color:var(--text)}
    .match-away{font-size:13px;color:var(--text3)}
    .match-score-wrap{text-align:center;margin:0 14px}
    .match-score{font-size:24px;font-weight:900;color:var(--text);line-height:1;letter-spacing:.08em}
    .match-minute{margin-top:4px;font-size:11px;font-family:'JetBrains Mono',monospace;color:#444;font-weight:700}
    .match-minute.live{color:#22c55e}
    .match-logo{width:26px;height:26px;opacity:.5}

    /* CONTEXT BAR */
    .ctx-bar{display:flex;gap:10px;flex-wrap:wrap;padding:0 0 8px;border-bottom:1px solid #111;margin-bottom:8px}
    .ctx-item{font-size:10px;font-family:'JetBrains Mono',monospace;color:#444}
    .ctx-item span{color:#666}
    .ctx-item.good span{color:#22c55e}
    .ctx-item.warn span{color:#f59e0b}
    .form-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:1px}
    .form-W{background:#22c55e}.form-D{background:#f59e0b}.form-L{background:#ef4444}.form-?{background:#333}

    /* VALUE SCORE */
    .value-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .value-score-wrap{display:flex;align-items:center;gap:6px}
    .value-score{font-size:18px;font-weight:900;font-family:'JetBrains Mono',monospace}
    .value-label{font-size:10px;font-family:'JetBrains Mono',monospace;opacity:.7}
    .value-score.high{color:#22c55e}.value-score.med{color:#f59e0b}.value-score.low{color:#ef4444}.value-score.none{color:#333}
    .value-meter{flex:1;height:4px;background:#111;border-radius:2px;overflow:hidden}
    .value-fill{height:100%;border-radius:2px;transition:width .3s}

    /* TRIGGERS */
    .triggers{border-top:1px solid #181818;padding:12px 18px;display:flex;flex-direction:column;gap:12px}
    .trigger-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
    .trigger-badge{display:inline-block;border-radius:5px;padding:2px 9px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;white-space:nowrap}
    .signal-badge{font-size:10px;font-family:'JetBrains Mono',monospace;padding:1px 6px;border-radius:4px}
    .signal-strong{background:#052010;color:#22c55e;border:1px solid #22c55e33}
    .signal-weak{background:#1a1205;color:#f59e0b;border:1px solid #f59e0b33}
    .trigger-source{font-size:10px;color:var(--text4);font-family:'JetBrains Mono',monospace}
    .trigger-detail{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;line-height:1.5;margin-bottom:6px}
    .rec-box{border-radius:8px;padding:10px 12px;border:1px solid;margin-top:2px}
    .rec-title{font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700;letter-spacing:.08em;margin-bottom:5px;opacity:.7}
    .rec-bet{font-size:15px;font-weight:900;letter-spacing:.02em;margin-bottom:4px}
    .rec-reason{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text3);line-height:1.4;margin-bottom:7px}
    .rec-odds{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

    /* ODDS */
    .odds-chip{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:4px 10px;font-size:13px;font-weight:900;font-family:'JetBrains Mono',monospace;border:1px solid transparent;white-space:nowrap}
    .odds-chip.good{background:#052010;color:#22c55e;border-color:#22c55e44}
    .odds-chip.ok{background:#1a1205;color:#f59e0b;border-color:#f59e0b44}
    .odds-chip.low{background:#151515;color:#444;border-color:#222}
    .odds-chip.none{background:#111;color:#2a2a2a;border-color:#1a1a1a;font-size:10px}
    .odds-chip .chip-label{font-size:9px;opacity:.6}
    .odds-verdict{font-size:10px;font-family:'JetBrains Mono',monospace}
    .odds-verdict.good{color:#22c55e}.odds-verdict.ok{color:#f59e0b}.odds-verdict.low{color:#555}

    /* FREE REC */
    .free-rec{border-top:1px solid var(--border);padding:10px 18px;background:var(--bg)}
    .free-rec-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .free-rec-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:#2a2a2a;letter-spacing:.08em}
    .conf-badge{font-size:10px;font-family:'JetBrains Mono',monospace;padding:1px 7px;border-radius:4px;font-weight:700}
    .conf-high{background:#052010;color:#22c55e}.conf-medium{background:#1a1205;color:#f59e0b}.conf-low{background:#111;color:#444}
    .free-rec-bet{font-size:14px;font-weight:900;letter-spacing:.02em;margin-bottom:3px}
    .free-rec-reason{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text3);line-height:1.4;margin-bottom:6px}
    .free-rec-odds{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

    /* OBS BAR */
    .obs-bar{border-top:1px solid var(--border);padding:8px 18px;background:var(--bg);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .obs-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;flex-shrink:0}
    .obs-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text4);letter-spacing:.05em}
    .obs-stats{display:flex;gap:8px;flex-wrap:wrap}
    .obs-stat{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text4)}
    .obs-stat span{color:#555}
    .obs-nostats{font-size:10px;font-family:'JetBrains Mono',monospace;color:#222;font-style:italic}

    /* STANDINGS */
    .standings-wrap{display:none;border-top:1px solid var(--border);background:var(--bg);padding:12px 18px}
    .standings-wrap.open{display:block}
    .standings-title{font-size:10px;color:#333;font-family:'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
    .standings-table{width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:11px}
    .standings-table th{color:var(--text4);font-weight:400;text-align:right;padding:3px 6px;border-bottom:1px solid #111;font-size:9px}
    .standings-table th:first-child{text-align:left}
    .standings-table td{color:var(--text3);text-align:right;padding:4px 6px;border-bottom:1px solid #0d0d0d}
    .standings-table td:first-child{text-align:left}
    .standings-table tr.highlighted td{color:var(--text);background:var(--bg4)}
    .standings-table tr.highlighted td:first-child{border-left:2px solid #22c55e;padding-left:4px}
    .pos-num{color:#333;margin-right:5px}
    .team-name-cell{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:bottom}
    .gf{color:#22c55e}.ga{color:#ef4444}.pts-cell{font-weight:700;color:#aaa}
    .standings-loading{color:#2a2a2a;font-size:11px;font-family:'JetBrains Mono',monospace;padding:8px 0}

    /* PRE-MATCH */
    .pm-summary{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:10px;padding:12px 14px;margin-bottom:10px}
    .pm-top3{background:#052010;border:1px solid #22c55e22;border-radius:10px;padding:12px 14px;margin-bottom:14px}
    .pm-top3-title{font-size:11px;color:#22c55e;font-family:'JetBrains Mono',monospace;font-weight:700;margin-bottom:8px;letter-spacing:.05em}
    .pm-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
    .pm-card-header{padding:12px 14px 8px;border-bottom:1px solid #111}
    .pm-match-title{font-size:14px;font-weight:700;color:#f0f0f0}
    .pm-match-meta{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px}
    .pm-body{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
    .pm-row{display:flex;gap:8px;flex-wrap:wrap}
    .pm-stat{flex:1;min-width:140px;background:var(--bg3);border-radius:6px;padding:8px 10px}
    .pm-stat-label{font-size:9px;color:var(--text4);font-family:'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
    .pm-stat-value{font-size:13px;font-weight:700;color:var(--text2);font-family:'JetBrains Mono',monospace}
    .pm-stat-value.good{color:#22c55e}.pm-stat-value.warn{color:#f59e0b}.pm-stat-value.bad{color:#ef4444}
    .pm-bet-box{background:#05101a;border:1px solid #3b82f633;border-radius:8px;padding:10px 12px}
    .pm-bet-label{font-size:10px;color:#3b82f6;font-family:'JetBrains Mono',monospace;font-weight:700;margin-bottom:4px}
    .pm-bet-text{font-size:14px;font-weight:900;color:#f0f0f0;margin-bottom:3px}
    .pm-bet-reason{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;line-height:1.4}
    .pm-value-score{display:inline-flex;align-items:center;gap:6px;margin-top:6px}
    .pm-vs-num{font-size:20px;font-weight:900;font-family:'JetBrains Mono',monospace}
    .pm-vs-label{font-size:9px;font-family:'JetBrains Mono',monospace;color:#444}
    .pm-injury{font-size:11px;font-family:'JetBrains Mono',monospace;color:#ef4444;padding:2px 0}
    .pm-injury.doubt{color:#f59e0b}
    .pm-ref{font-size:11px;font-family:'JetBrains Mono',monospace;color:#a855f7}
    .pm-empty{text-align:center;padding:40px 0;color:#222;font-family:'JetBrains Mono',monospace;font-size:12px}
    .pm-load-btn{background:#052010;border:1px solid #22c55e33;color:#22c55e;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:12px;font-family:'JetBrains Mono',monospace;margin-bottom:14px}

    /* HISTORY */
    .hist-controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
    .hist-filter{background:transparent;border:1px solid #1a1a1a;color:#555;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:11px;font-family:'JetBrains Mono',monospace}
    .hist-filter.active{background:#1a1a1a;color:#fff;border-color:#333}
    .hist-clear{background:#1a0505;border:1px solid #ef444433;color:#ef4444;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:11px;font-family:'JetBrains Mono',monospace;margin-left:auto}
    .hist-stats-bar{display:flex;gap:16px;background:#111;border:1px solid #1a1a1a;border-radius:8px;padding:10px 14px;margin-bottom:12px;flex-wrap:wrap}
    .hist-stat{font-size:11px;font-family:'JetBrains Mono',monospace}
    .hist-stat span.g{color:#22c55e;font-weight:700}.hist-stat span.r{color:#ef4444;font-weight:700}
    .hist-stat span.y{color:#f59e0b;font-weight:700}.hist-stat span.w{color:#f0f0f0;font-weight:700}
    .hist-entry{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px}
    .hist-entry.won{border-left:3px solid #22c55e}.hist-entry.lost{border-left:3px solid #ef4444}
    .hist-entry.open{border-left:3px solid #f59e0b}.hist-entry.unknown{border-left:3px solid #333}
    .hist-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
    .hist-match{font-size:14px;font-weight:700;color:#f0f0f0}
    .hist-result-badge{font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:700;padding:2px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0}
    .hist-result-badge.won{background:#052010;color:#22c55e}.hist-result-badge.lost{background:#1a0505;color:#ef4444}
    .hist-result-badge.open{background:#1a1205;color:#f59e0b}.hist-result-badge.unknown{background:#111;color:#444}
    .hist-meta{font-size:10px;color:var(--text4);font-family:'JetBrains Mono',monospace;margin-bottom:5px}
    .hist-scenario{display:inline-block;border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-bottom:5px}
    .hist-bet{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:4px}
    .hist-scores{display:flex;gap:14px;font-size:11px;font-family:'JetBrains Mono',monospace;flex-wrap:wrap}
    .hist-score-item{color:var(--text4)}.hist-score-item span{color:#666}
    .hist-odds-chip{display:inline-block;border-radius:4px;padding:2px 7px;font-size:11px;font-family:'JetBrains Mono',monospace}
    .hist-odds-chip.good{background:#052010;color:#22c55e;border:1px solid #22c55e33}
    .hist-odds-chip.ok{background:#1a1205;color:#f59e0b;border:1px solid #f59e0b33}
    .hist-odds-chip.low{background:#111;color:#444;border:1px solid #222}
    .hist-note{font-size:11px;font-family:'JetBrains Mono',monospace;color:#333;margin-top:6px;font-style:italic}
    .hist-empty{text-align:center;padding:50px 0;color:#222;font-family:'JetBrains Mono',monospace;font-size:12px}
    .hist-vs{font-size:10px;font-family:'JetBrains Mono',monospace;color:#555;margin-top:4px}

    /* STATUS */
    #status-box{border-radius:10px;padding:12px 14px;margin-bottom:12px;font-family:'JetBrains Mono',monospace;font-size:12px;display:none}
    #status-box.error{background:#1a0505;border:1px solid #ef444433;color:#ef4444}
    #status-box.info{background:var(--bg);border:1px solid var(--blue);color:var(--blue)}
    #empty-state{text-align:center;padding:50px 0;display:none}
    #empty-state .icon{font-size:36px;margin-bottom:10px}
    #empty-state .label{font-family:'JetBrains Mono',monospace;font-size:12px;color:#333}
    #footer{text-align:center;margin-top:20px;color:#1f1f1f;font-size:10px;font-family:'JetBrains Mono',monospace}

    .spin{display:inline-block;animation:spin 1s linear infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div>
      <div id="title">⚡ LIVE SCOUT</div>
      <div id="subtitle">Bereit...</div>
    </div>
    <div id="header-right">
      <div id="alert-badge">0 ALERTS</div>
      <span id="sb-status" style="font-size:10px;font-family:'JetBrains Mono',monospace;color:#333;cursor:default">☁️ ...</span>
      <button class="hbtn" id="theme-btn" onclick="toggleTheme()" style="font-size:14px">🌙</button>
      <button class="hbtn" id="notif-btn" onclick="toggleNotifications()">🔔 An</button>
      <button class="hbtn" id="refresh-btn" onclick="fetchData()">↻ Refresh</button>
    </div>
  </div>
</div>

<div id="tabs">
  <div id="tabs-inner">
    <button class="tab-btn active" onclick="switchTab('live',this)">⚡ Live<span class="tab-count" id="tab-live-count">0</span></button>
    <button class="tab-btn" onclick="switchTab('prematch',this)">🔭 Pre-Match<span class="tab-count" id="tab-pm-count">0</span></button>
    <button class="tab-btn" onclick="switchTab('history',this)">📋 Historie<span class="tab-count" id="tab-hist-count">0</span></button>
  </div>
</div>

<!-- LIVE VIEW -->
<div id="view-live">
<div id="main">
  <div class="filter-row" id="filters-meta">
    <button class="filter-btn active" data-filter="ALL" onclick="setFilter('ALL',this)">Alle (0)</button>
    <button class="filter-btn" data-filter="ALERTS" onclick="setFilter('ALERTS',this)">🚨 Alerts (0)</button>
    <button class="filter-btn" data-filter="VALUE" onclick="setFilter('VALUE',this)">💰 Value ≥1.8</button>
    <button class="filter-btn" data-filter="HIGH_VALUE" onclick="setFilter('HIGH_VALUE',this)">🎯 Score ≥70</button>
  </div>

// ─── VALUE SCORE ENGINE ──────────────────────────────────────────────────────
function calcValueScore(odd, probability, formBonus=0, h2hBonus=0, contextBonus=0){
  if(!odd||odd<=1) return 0;
  const impliedProb = 1/odd;
  const edge = probability - impliedProb;
  const baseScore = Math.round((edge * 200) + 50 + formBonus + h2hBonus + contextBonus);
  return Math.max(0, Math.min(100, baseScore));
}

function valueScoreClass(s){return s>=70?"high":s>=50?"med":s>=30?"low":"none"}
function valueScoreColor(s){return s>=70?"#22c55e":s>=50?"#f59e0b":s>=30?"#ef4444":"#333"}

function renderValueScore(score){
  if(!score&&score!==0) return "";
  const cls=valueScoreClass(score);
  const color=valueScoreColor(score);
  return `<div class="value-bar">
    <div class="value-score-wrap">
      <div class="value-score ${cls}" style="color:${color}">${score}</div>
      <div class="value-label">/100<br>Value</div>
    </div>
    <div class="value-meter"><div class="value-fill" style="width:${score}%;background:${color}"></div></div>
  </div>`;
}

// ─── ODDS EXTRACTION ─────────────────────────────────────────────────────────
const ODDS_MAP={
  RED_CARD:["Match Winner","Double Chance"],FAVORITE_BEHIND:["Match Winner","Double Chance"],
  PRESSURE:["Match Winner"],BOTH_OFFENSIVE:["Goals Over/Under","Both Teams Score"],
  LUCKY_GOAL:["Double Chance","Both Teams Score","Goals Over/Under"],
  LATE_GAME:["Goals Over/Under","Both Teams Score"],HALFTIME_VALUE:["Second Half Winner","Match Winner"],
  GOALLESS_PRESSURE:["Goals Over/Under","Both Teams Score"],
  UNDERDOG_LEADS:["Match Winner","Double Chance"],GOALLESS_LATE:["Goals Over/Under","Both Teams Score"],
  HIGH_SCORING:["Goals Over/Under","Both Teams Score"],NARROW_LATE:["Goals Over/Under","Both Teams Score"],
  FREE:["Match Winner","Double Chance","Goals Over/Under","Both Teams Score"],
};

function extractOdds(bookmakers,scenarioId,ctx){
  if(!bookmakers||!bookmakers.length) return[];
  let bm=bookmakers.find(b=>b.id===BOOKMAKER_ID)||bookmakers[0];
  if(!bm) return[];
  const bets=bm.bets||[], targets=ODDS_MAP[scenarioId]||[], results=[];
  for(const betName of targets){
    const bet=bets.find(b=>b.name===betName);
    if(!bet) continue;
    const vals=bet.values||[];
    if(betName==="Match Winner"){
      if(ctx.favorTeam==="home"){const v=vals.find(v=>v.value==="Home");if(v)results.push({label:`${ctx.homeName} Sieg`,odd:parseFloat(v.odd)})}
      else if(ctx.favorTeam==="away"){const v=vals.find(v=>v.value==="Away");if(v)results.push({label:`${ctx.awayName} Sieg`,odd:parseFloat(v.odd)})}
    }
    if(betName==="Double Chance"){
      if(ctx.favorTeam==="home"){const v=vals.find(v=>v.value==="Home/Draw");if(v)results.push({label:"DC Heim/X",odd:parseFloat(v.odd)})}
      else if(ctx.favorTeam==="away"){const v=vals.find(v=>v.value==="Draw/Away");if(v)results.push({label:"DC X/Gast",odd:parseFloat(v.odd)})}
    }
    if(betName==="Goals Over/Under"){
      const total=(ctx.homeGoals||0)+(ctx.awayGoals||0);
      const line=total+1.5;
      const hit=vals.find(v=>v.value===`Over ${line}`)||vals.find(v=>v.value&&v.value.startsWith("Over")&&parseFloat(v.value.replace("Over ",""))>=line);
      if(hit)results.push({label:hit.value,odd:parseFloat(hit.odd)});
    }
    if(betName==="Both Teams Score"){const v=vals.find(v=>v.value==="Yes");if(v)results.push({label:"BTTS–Ja",odd:parseFloat(v.odd)})}
    if(betName==="Second Half Winner"){
      const key=ctx.favorTeam==="home"?"Home":"Away";
      const v=vals.find(v=>v.value===key);
      if(v)results.push({label:`2H ${ctx.favorTeam==="home"?ctx.homeName:ctx.awayName}`,odd:parseFloat(v.odd)});
    }
  }
  const seen=new Set();
  return results.filter(r=>{if(!r.odd||isNaN(r.odd)||r.odd<=1)return false;if(seen.has(r.label))return false;seen.add(r.label);return true}).sort((a,b)=>b.odd-a.odd);
}

function renderOddsChips(arr){

  return arr.map(o=>`<span class="odds-chip ${oddsClass(o.odd)}">${o.odd.toFixed(2)}<span class="chip-label"> ${o.label}</span></span>`).join("");
}

// ─── LIVE ANALYSIS ───────────────────────────────────────────────────────────
function analyzeFixture(fix,events,stats,teamStats){
  const triggers=[];
  const homeId=safeGet(fix,"teams","home","id");
  const homeName=safeGet(fix,"teams","home","name")||"Heim";
  const awayName=safeGet(fix,"teams","away","name")||"Gast";
  const homeGoals=safeGet(fix,"goals","home")??0;
  const awayGoals=safeGet(fix,"goals","away")??0;
  const minute=safeGet(fix,"fixture","status","elapsed")??0;
  const short=safeGet(fix,"fixture","status","short")||"";
  const isHT=short==="HT";
  const homeStats=safeGet(stats,0,"statistics")||[];
  const awayStats=safeGet(stats,1,"statistics")||[];
  const homeShotsOn=getStat(homeStats,"Shots on Goal"),awayShotsOn=getStat(awayStats,"Shots on Goal");
  const homeShotsTotal=getStat(homeStats,"Total Shots"),awayShotsTotal=getStat(awayStats,"Total Shots");
  const homePoss=getStat(homeStats,"Ball Possession"),awayPoss=getStat(awayStats,"Ball Possession");
  const homeCorners=getStat(homeStats,"Corner Kicks"),awayCorners=getStat(awayStats,"Corner Kicks");
  const homeDangerous=getStat(homeStats,"Dangerous Attacks"),awayDangerous=getStat(awayStats,"Dangerous Attacks");
  const homeXG=+(homeShotsOn*0.33).toFixed(1),awayXG=+(awayShotsOn*0.33).toFixed(1);

  // Form from team stats
  const homeForm=parseForm(safeGet(teamStats,"home","form"));
  const awayForm=parseForm(safeGet(teamStats,"away","form"));
  const homeFormScore=formScore(homeForm);
  const awayFormScore=formScore(awayForm);

  if(minute<5&&!isHT) return triggers;
  const ctx={homeName,awayName,homeGoals,awayGoals};

  // 1. ROTE KARTE
  const reds=(events||[]).filter(e=>e?.type==="Card"&&e?.detail==="Red Card");
  if(reds.length>0){
    const last=reds[reds.length-1];
    const redTeamId=safeGet(last,"team","id");
    const beneficiary=redTeamId===homeId?awayName:homeName;
    const favorTeam=redTeamId===homeId?"away":"home";
    const redMin=safeGet(last,"time","elapsed");
    const formBonus=favorTeam==="home"?(homeFormScore-awayFormScore)*2:(awayFormScore-homeFormScore)*2;
    const vs=calcValueScore(1.7,0.71,formBonus,0,15);
    triggers.push({scenario:SC.RED_CARD,signal:"strong",oddsCtx:{...ctx,favorTeam},
      recCtx:{minute:redMin,favorName:beneficiary},valueScore:vs,
      detail:`${safeGet(last,"team","name")||"?"} in Unterzahl seit ${redMin}'`,
      recBet:favorTeam==="home"?`${homeName} Sieg oder DC Heim/X`:`${awayName} Sieg oder DC X/Gast`,
      reason:`Team in Überzahl gewinnt nach Roter Karte in ~71% der Fälle. Je früher die Karte, desto größer der Vorteil.`});
  }

  // 2. FAVORIT ZURÜCK
  const homeStrongBehind=homeGoals<awayGoals&&minute>=15&&((homePoss>58&&homeShotsOn>=2)||(homePoss===0&&homeShotsTotal>=3&&homeCorners>=2));
  const awayStrongBehind=awayGoals<homeGoals&&minute>=15&&((awayPoss>58&&awayShotsOn>=2)||(awayPoss===0&&awayShotsTotal>=3&&awayCorners>=2));
  const homeWeakBehind=!homeStrongBehind&&homeGoals<awayGoals&&minute>=20&&((homePoss>62&&(homeShotsTotal>=4||homeCorners>=3))||(homePoss===0&&homeShotsTotal>=3&&homeCorners>=2));
  const awayWeakBehind=!awayStrongBehind&&awayGoals<homeGoals&&minute>=20&&((awayPoss>62&&(awayShotsTotal>=4||awayCorners>=3))||(awayPoss===0&&awayShotsTotal>=3&&awayCorners>=2));

  if(homeStrongBehind){
    const vs=calcValueScore(1.8,0.62,homeFormScore*1.5,0,10);
    triggers.push({scenario:SC.FAVORITE_BEHIND,signal:"strong",oddsCtx:{...ctx,favorTeam:"home"},valueScore:vs,
      recCtx:{favorName:homeName,poss:homePoss,shots:homeShotsOn},
      detail:`${homeName}: ${homePoss}% Ballbesitz · ${homeShotsOn} Schüsse · zurück ${homeGoals}:${awayGoals}`,
      recBet:`${homeName} Sieg oder DC Heim/X`,
      reason:`${homeName} dominiert klar aber liegt zurück. Comeback-Wahrscheinlichkeit bei ~62% auf Basis Ballbesitz+Schüsse.`});
  } else if(homeWeakBehind){
    const vs=calcValueScore(1.9,0.48,homeFormScore,0,0);
    triggers.push({scenario:SC.FAVORITE_BEHIND,signal:"weak",oddsCtx:{...ctx,favorTeam:"home"},valueScore:vs,
      recCtx:{favorName:homeName,poss:homePoss,shots:homeShotsTotal,corners:homeCorners},
      detail:`${homeName}: ${homePoss}% Ballbesitz · ${homeShotsTotal} Schüsse · ${homeCorners} Ecken · zurück ${homeGoals}:${awayGoals}`,
      recBet:`DC Heim/X – mit Vorsicht`,
      reason:`Schwaches Signal: ${homeName} hat Druck aber Stats sind begrenzt. Eigenes Urteil empfohlen.`});
  }
  if(awayStrongBehind){
    const vs=calcValueScore(1.8,0.62,awayFormScore*1.5,0,10);
    triggers.push({scenario:SC.FAVORITE_BEHIND,signal:"strong",oddsCtx:{...ctx,favorTeam:"away"},valueScore:vs,
      recCtx:{favorName:awayName,poss:awayPoss,shots:awayShotsOn},
      detail:`${awayName}: ${awayPoss}% Ballbesitz · ${awayShotsOn} Schüsse · zurück ${awayGoals}:${homeGoals}`,
      recBet:`${awayName} Sieg oder DC X/Gast`,
      reason:`${awayName} dominiert klar aber liegt zurück. Comeback-Wahrscheinlichkeit bei ~62%.`});
  } else if(awayWeakBehind){
    const vs=calcValueScore(1.9,0.48,awayFormScore,0,0);
    triggers.push({scenario:SC.FAVORITE_BEHIND,signal:"weak",oddsCtx:{...ctx,favorTeam:"away"},valueScore:vs,
      recCtx:{favorName:awayName,poss:awayPoss,shots:awayShotsTotal,corners:awayCorners},
      detail:`${awayName}: ${awayPoss}% Ballbesitz · ${awayShotsTotal} Schüsse · ${awayCorners} Ecken · zurück ${awayGoals}:${homeGoals}`,
      recBet:`DC X/Gast – mit Vorsicht`,
      reason:`Schwaches Signal. Eigenes Urteil empfohlen.`});
  }

  // 3. DRUCKPHASE
  if(homePoss>60&&homeCorners>=3&&homeShotsOn>=3&&minute>=20){
    const vs=calcValueScore(2.0,0.61,homeFormScore,0,8);
    triggers.push({scenario:SC.PRESSURE,signal:"strong",oddsCtx:{...ctx,favorTeam:"home"},valueScore:vs,
      recCtx:{favorName:homeName,poss:homePoss,shots:homeShotsOn,corners:homeCorners},
      detail:`${homeName}: ${homePoss}% · ${homeCorners} Ecken · ${homeShotsOn} Schüsse aufs Tor`,
      recBet:`${homeName} Sieg · Nächstes Tor ${homeName}`,
      reason:`Anhaltender Druck: ${homeCorners} Ecken, ${homeShotsOn} Schüsse. Teams in Druckphasen erzielen in >60% das nächste Tor.`});
  } else if(awayPoss>60&&awayCorners>=3&&awayShotsOn>=3&&minute>=20){
    const vs=calcValueScore(2.0,0.61,awayFormScore,0,8);
    triggers.push({scenario:SC.PRESSURE,signal:"strong",oddsCtx:{...ctx,favorTeam:"away"},valueScore:vs,
      recCtx:{favorName:awayName,poss:awayPoss,shots:awayShotsOn,corners:awayCorners},
      detail:`${awayName}: ${awayPoss}% · ${awayCorners} Ecken · ${awayShotsOn} Schüsse aufs Tor`,
      recBet:`${awayName} Sieg · Nächstes Tor ${awayName}`,
      reason:`Anhaltender Druck. In >60% der Fälle fällt das nächste Tor für das drückende Team.`});
  }

  // 4. BEIDE OFFENSIV
  if(homeShotsOn>=3&&awayShotsOn>=3&&minute>=20){
    const vs=calcValueScore(1.75,0.72,(homeFormScore+awayFormScore)*0.5,0,5);
    triggers.push({scenario:SC.BOTH_OFFENSIVE,signal:"strong",oddsCtx:{...ctx,favorTeam:null},valueScore:vs,
      recCtx:{shots1:homeShotsOn,shots2:awayShotsOn},
      detail:`${homeName}: ${homeShotsOn} / ${awayName}: ${awayShotsOn} Schüsse aufs Tor`,
      recBet:`Over ${homeGoals+awayGoals+0.5} Tore · BTTS–Ja`,
      reason:`Beide Teams offensiv aktiv. BTTS-Wahrscheinlichkeit >70% bei diesen Schusszahlen.`});
  }

  // 5. GLÜCKSTREFFER
  if(minute>=20){
    if(homeGoals>awayGoals&&awayXG>homeXG+0.6&&awayXG>=0.7){
      const vs=calcValueScore(1.85,0.58,awayFormScore,0,10);
      triggers.push({scenario:SC.LUCKY_GOAL,signal:"strong",oddsCtx:{...ctx,favorTeam:"away"},valueScore:vs,
        recCtx:{leaderName:homeName,favorName:awayName,xgLow:homeXG,xgHigh:awayXG},
        detail:`${homeName} führt ${homeGoals}:${awayGoals} – xG: Heim ${homeXG} / Gast ${awayXG}`,
        recBet:`DC X/Gast oder BTTS–Ja`,
        reason:`Scoreline gegen die Chancenqualität. ${awayName} dominiert – Markt korrigiert statistisch.`});
    } else if(awayGoals>homeGoals&&homeXG>awayXG+0.6&&homeXG>=0.7){
      const vs=calcValueScore(1.85,0.58,homeFormScore,0,10);
      triggers.push({scenario:SC.LUCKY_GOAL,signal:"strong",oddsCtx:{...ctx,favorTeam:"home"},valueScore:vs,
        recCtx:{leaderName:awayName,favorName:homeName,xgLow:awayXG,xgHigh:homeXG},
        detail:`${awayName} führt ${awayGoals}:${homeGoals} – xG: Heim ${homeXG} / Gast ${awayXG}`,
        recBet:`DC Heim/X oder BTTS–Ja`,
        reason:`${homeName} dominiert trotz Rückstand. Markt-Korrektur wahrscheinlich.`});
    }
  }

  // 6. SCHLUSSPHASE
  if(minute>=75){
    const total=homeShotsOn+awayShotsOn;
    if(total>=5&&Math.abs(homeGoals-awayGoals)<=1){
      const loser=homeGoals<awayGoals?homeName:awayGoals<homeGoals?awayName:null;
      const ft=loser===homeName?"home":loser===awayName?"away":null;
      const vs=calcValueScore(1.9,0.55,0,0,12);
      triggers.push({scenario:SC.LATE_GAME,signal:"strong",oddsCtx:{...ctx,favorTeam:ft},valueScore:vs,
        recCtx:{minute,shots:total},
        detail:`${minute}' · ${homeGoals}:${awayGoals} · ${total} Schüsse aufs Tor`,
        recBet:loser?`${loser} Ausgleich · Over ${homeGoals+awayGoals+0.5}`:`Over ${homeGoals+awayGoals+0.5} · BTTS`,
        reason:`Schlussphase mit aktivem Spiel. Späte Tore werden systematisch unterbewertet.`});
    }
  }

  // 7. HT VALUE
  if(isHT||(minute>=42&&minute<=48)){
    if(homePoss>60&&homeShotsTotal>=4&&homeGoals<=awayGoals){
      const vs=calcValueScore(1.95,0.58,homeFormScore,0,8);
      triggers.push({scenario:SC.HALFTIME_VALUE,signal:"strong",oddsCtx:{...ctx,favorTeam:"home"},valueScore:vs,
        recCtx:{favorName:homeName,poss:homePoss,shots:homeShotsTotal},
        detail:`HT: ${homeName} dominiert (${homePoss}% · ${homeShotsTotal} Schüsse) – ${homeGoals}:${awayGoals}`,
        recBet:`${homeName} gewinnt 2. Halbzeit`,
        reason:`Halbzeit-Dominanz ohne entsprechenden Score. 2H-Wetten auf das dominante Team haben hohen EV.`});
    } else if(awayPoss>60&&awayShotsTotal>=4&&awayGoals<=homeGoals){
      const vs=calcValueScore(1.95,0.58,awayFormScore,0,8);
      triggers.push({scenario:SC.HALFTIME_VALUE,signal:"strong",oddsCtx:{...ctx,favorTeam:"away"},valueScore:vs,
        recCtx:{favorName:awayName,poss:awayPoss,shots:awayShotsTotal},
        detail:`HT: ${awayName} dominiert (${awayPoss}% · ${awayShotsTotal} Schüsse) – ${awayGoals}:${homeGoals}`,
        recBet:`${awayName} gewinnt 2. Halbzeit`,
        reason:`${awayName} dominiert zur Halbzeit ohne entsprechenden Score.`});
    }
  }

  // 8. TORLOS + DRUCK
  if(homeGoals===0&&awayGoals===0&&minute>=15){
    const totalShotsOn=homeShotsOn+awayShotsOn,totalCorners=homeCorners+awayCorners,totalDangerous=homeDangerous+awayDangerous;
    if(totalShotsOn>=4||(totalCorners>=5&&minute>=30)||totalDangerous>=25){
      const vs=calcValueScore(1.6,0.82,0,0,10);
      triggers.push({scenario:SC.GOALLESS_PRESSURE,signal:"strong",oddsCtx:{...ctx,favorTeam:null},valueScore:vs,
        recCtx:{minute,shots:totalShotsOn,corners:totalCorners},
        detail:`0:0 · ${minute}' · ${totalShotsOn} Schüsse · ${totalCorners} Ecken · ${totalDangerous} Gefahrenangriffe`,
        recBet:`Over 0.5 Tore · BTTS · Over 1.5`,
        reason:`${minute}' ohne Tor trotz hohem Druck. Over 0.5 ist in solchen Spielen >80% erfolgreich.`});
    }
  }

  return triggers;
}

// ─── SCORE-ONLY ANALYSIS ─────────────────────────────────────────────────────
function analyzeScoreOnly(fix,events,standings){
  const triggers=[];
  const homeId=safeGet(fix,"teams","home","id");
  const awayId=safeGet(fix,"teams","away","id");
  const homeName=safeGet(fix,"teams","home","name")||"Heim";
  const awayName=safeGet(fix,"teams","away","name")||"Gast";
  const homeGoals=safeGet(fix,"goals","home")??0;
  const awayGoals=safeGet(fix,"goals","away")??0;
  const minute=safeGet(fix,"fixture","status","elapsed")??0;
  const totalGoals=homeGoals+awayGoals;
  const ctx={homeName,awayName,homeGoals,awayGoals};
  if(minute<10) return triggers;

  // Rote Karte (events)
  const reds=(events||[]).filter(e=>e?.type==="Card"&&e?.detail==="Red Card");
  if(reds.length>0){
    const last=reds[reds.length-1];
    const rtId=safeGet(last,"team","id");
    const beneficiary=rtId===homeId?awayName:homeName;
    const ft=rtId===homeId?"away":"home";
    triggers.push({scenario:SC.RED_CARD,signal:"strong",oddsCtx:{...ctx,favorTeam:ft},valueScore:72,
      recCtx:{minute:safeGet(last,"time","elapsed"),favorName:beneficiary},
      detail:`${safeGet(last,"team","name")||"?"} in Unterzahl seit ${safeGet(last,"time","elapsed")}'`,
      recBet:ft==="home"?`${homeName} Sieg oder DC Heim/X`:`${awayName} Sieg oder DC X/Gast`,
      reason:`Team in Überzahl gewinnt nach Roter Karte in ~71% der Fälle.`,scoreOnly:true});
  }

  // Underdog führt
  if(standings&&standings.length>0&&homeGoals!==awayGoals&&minute>=15){
    const homeRow=standings.find(r=>r.team?.id===homeId);
    const awayRow=standings.find(r=>r.team?.id===awayId);
    if(homeRow&&awayRow){
      const homePos=homeRow.rank||99,awayPos=awayRow.rank||99;
      const diff=Math.abs(homePos-awayPos);
      if(diff>=5){
        const favIsHome=homePos<awayPos;
        const favLeads=favIsHome?homeGoals>awayGoals:awayGoals>homeGoals;
        if(!favLeads){
          const favName=favIsHome?homeName:awayName;
          const undName=favIsHome?awayName:homeName;
          const ft=favIsHome?"home":"away";
          const vs=calcValueScore(1.85,0.65,0,0,diff>=8?15:5);
          triggers.push({scenario:SC.UNDERDOG_LEADS,signal:diff>=8?"strong":"weak",
            oddsCtx:{...ctx,favorTeam:ft},valueScore:vs,
            recCtx:{favorite:favName,underdog:undName,favoritePos:favIsHome?homePos:awayPos,underdogPos:favIsHome?awayPos:homePos},
            detail:`${undName} (Platz ${favIsHome?awayPos:homePos}) führt gegen ${favName} (Platz ${favIsHome?homePos:awayPos})`,
            recBet:`${favName} Sieg oder DC ${ft==="home"?"Heim/X":"X/Gast"}`,
            reason:`Tabellarischer Favorit liegt zurück. In ~65% der Fälle holen stärkere Teams solche Rückstände auf.`,scoreOnly:true});
        }
      }
    }
  }

  // Torlos spät
  if(homeGoals===0&&awayGoals===0&&minute>=60){
    triggers.push({scenario:SC.GOALLESS_LATE,signal:"strong",oddsCtx:{...ctx,favorTeam:null},valueScore:68,
      recCtx:{minute},detail:`0:0 nach ${minute}' – ungewöhnlich lang torlos`,
      recBet:`Over 0.5 Tore · BTTS–Ja`,
      reason:`0:0 nach ${minute}'. Over 0.5 Tore hat ab Minute 60 bei 0:0 sehr hohe Trefferquote.`,scoreOnly:true});
  }

  // Viele Tore
  if(totalGoals>=2&&minute>=20&&minute<=75){
    const vs=calcValueScore(1.7,0.73,0,0,8);
    triggers.push({scenario:SC.HIGH_SCORING,signal:"strong",oddsCtx:{...ctx,favorTeam:null},valueScore:vs,
      recCtx:{goals:totalGoals},detail:`Bereits ${totalGoals} Tore (${homeGoals}:${awayGoals}) · offenes Spiel`,
      recBet:`BTTS–Ja · Over ${totalGoals+0.5} Tore`,
      reason:`Offenes Spiel mit ${totalGoals} Toren. BTTS und weitere Tore sehr wahrscheinlich.`,scoreOnly:true});
  }

  // Knapp & Spät
  if(minute>=75&&Math.abs(homeGoals-awayGoals)===1){
    const loser=homeGoals<awayGoals?homeName:awayName;
    const ft=homeGoals<awayGoals?"home":"away";
    triggers.push({scenario:SC.NARROW_LATE,signal:"strong",oddsCtx:{...ctx,favorTeam:ft},valueScore:60,
      recCtx:{minute,loser},detail:`${minute}' – ${homeGoals}:${awayGoals} · ${loser} kämpft um Ausgleich`,
      recBet:`${loser} Ausgleich · Over ${totalGoals+0.5} Tore`,
      reason:`Schlussphase mit knappem Stand. Das zurückliegende Team wirft alles nach vorne.`,scoreOnly:true});
  }

  return triggers;
}

// ─── FREE RECOMMENDATION ─────────────────────────────────────────────────────
function buildFreeRec(fix,stats,bookmakers,teamStats){
  const homeName=safeGet(fix,"teams","home","name")||"Heim";
  const awayName=safeGet(fix,"teams","away","name")||"Gast";
  const homeGoals=safeGet(fix,"goals","home")??0;
  const awayGoals=safeGet(fix,"goals","away")??0;
  const minute=safeGet(fix,"fixture","status","elapsed")??0;
  const short=safeGet(fix,"fixture","status","short")||"";
  const isHT=short==="HT";
  const homeStats=safeGet(stats,0,"statistics")||[];
  const awayStats=safeGet(stats,1,"statistics")||[];
  const homeShotsOn=getStat(homeStats,"Shots on Goal"),awayShotsOn=getStat(awayStats,"Shots on Goal");
  const homeShotsTotal=getStat(homeStats,"Total Shots"),awayShotsTotal=getStat(awayStats,"Total Shots");
  const homePoss=getStat(homeStats,"Ball Possession"),awayPoss=getStat(awayStats,"Ball Possession");
  const homeCorners=getStat(homeStats,"Corner Kicks"),awayCorners=getStat(awayStats,"Corner Kicks");
  const homeDangerous=getStat(homeStats,"Dangerous Attacks"),awayDangerous=getStat(awayStats,"Dangerous Attacks");
  const homeXG=+(homeShotsOn*0.33).toFixed(1),awayXG=+(awayShotsOn*0.33).toFixed(1);
  const totalGoals=homeGoals+awayGoals;
  const minutesLeft=isHT?45:Math.max(0,90-minute);
  const homeForm=parseForm(safeGet(teamStats,"home","form"));
  const awayForm=parseForm(safeGet(teamStats,"away","form"));
  const homeFS=formScore(homeForm),awayFS=formScore(awayForm);

  const candidates=[];
  const homeDomScore=homePoss>0?(homePoss/100)*0.4+(homeShotsOn/10)*0.3+(homeCorners/10)*0.15+(homeDangerous/50)*0.15:(homeShotsTotal/10)*0.4+(homeCorners/10)*0.35+(homeShotsOn/10)*0.25;
  const awayDomScore=awayPoss>0?(awayPoss/100)*0.4+(awayShotsOn/10)*0.3+(awayCorners/10)*0.15+(awayDangerous/50)*0.15:(awayShotsTotal/10)*0.4+(awayCorners/10)*0.35+(awayShotsOn/10)*0.25;

  if(homeDomScore>awayDomScore+0.08&&homeGoals<=awayGoals&&minute>=15){
    const strength=homeDomScore-awayDomScore;
    const statsNote=homePoss>0?`${homePoss}% Ballbesitz, ${homeShotsTotal} Schüsse, ${homeCorners} Ecken`:`${homeShotsTotal} Schüsse, ${homeCorners} Ecken`;
    candidates.push({favorTeam:"home",bet:`${homeName} Sieg oder DC Heim/X`,
      reason:`${homeName} dominiert (${statsNote}) steht aber nur ${homeGoals}:${awayGoals}. Form: ${homeFS}/15`,
      confidence:strength>0.15?"HOCH":"MITTEL",score:strength*(minutesLeft>20?1.2:0.8),
      valueScore:calcValueScore(1.85,0.60,homeFS*2,0,10)});
  }
  if(awayDomScore>homeDomScore+0.08&&awayGoals<=homeGoals&&minute>=15){
    const strength=awayDomScore-homeDomScore;
    const statsNote=awayPoss>0?`${awayPoss}% Ballbesitz, ${awayShotsTotal} Schüsse, ${awayCorners} Ecken`:`${awayShotsTotal} Schüsse, ${awayCorners} Ecken`;
    candidates.push({favorTeam:"away",bet:`${awayName} Sieg oder DC X/Gast`,
      reason:`${awayName} dominiert (${statsNote}) steht aber nur ${awayGoals}:${homeGoals}. Form: ${awayFS}/15`,
      confidence:strength>0.15?"HOCH":"MITTEL",score:strength*(minutesLeft>20?1.2:0.8),
      valueScore:calcValueScore(1.85,0.60,awayFS*2,0,10)});
  }
  if(homeShotsOn>=2&&awayShotsOn>=2&&minute>=20&&minutesLeft>=20){
    const attackScore=(homeShotsOn+awayShotsOn)/10+(homeCorners+awayCorners)/20;
    candidates.push({favorTeam:null,bet:`Over ${totalGoals+0.5} Tore oder BTTS–Ja`,
      reason:`Beide Teams offensiv aktiv (${homeShotsOn}+${awayShotsOn} Schüsse aufs Tor).`,
      confidence:attackScore>0.6?"HOCH":"MITTEL",score:attackScore*(minutesLeft>25?1.1:0.7),
      valueScore:calcValueScore(1.75,0.70,(homeFS+awayFS),0,5)});
  }
  if(minute>=70&&Math.abs(homeGoals-awayGoals)<=1&&(homeShotsOn+awayShotsOn)>=4){
    const loser=homeGoals<awayGoals?homeName:awayGoals<homeGoals?awayName:null;
    candidates.push({favorTeam:loser===homeName?"home":loser===awayName?"away":null,
      bet:loser?`${loser} Ausgleich · Over ${totalGoals+0.5}`:`Over ${totalGoals+0.5} Tore`,
      reason:`${minute}' – knappes Spiel mit aktivem Angriffsspiel.`,
      confidence:"MITTEL",score:0.5*(minutesLeft<15?1.3:1.0),
      valueScore:calcValueScore(1.9,0.55,0,0,12)});
  }
  if(homeGoals===0&&awayGoals===0&&minute>=20){
    const totalP=(homeShotsOn+awayShotsOn)+(homeCorners+awayCorners)*0.5+(homeDangerous+awayDangerous)*0.02;
    if(totalP>=5) candidates.push({favorTeam:null,bet:`Over 0.5 Tore · BTTS`,
      reason:`0:0 bei ${minute}' trotz hohem Druck.`,
      confidence:totalP>8?"HOCH":"MITTEL",score:(totalP/10)*(minutesLeft>30?1.2:0.9),
      valueScore:calcValueScore(1.6,0.82,0,0,10)});
  }

  if(!candidates.length) return null;
  const best=candidates.sort((a,b)=>b.score-a.score)[0];
  const oddsCtx={homeName,awayName,homeGoals,awayGoals,favorTeam:best.favorTeam};
  const oddsData=extractOdds(bookmakers,best.favorTeam?(best.bet.includes("Over")||best.bet.includes("BTTS")?"BOTH_OFFENSIVE":"FAVORITE_BEHIND"):"BOTH_OFFENSIVE",oddsCtx);
  return{...best,oddsData};
}

// ─── STANDINGS ───────────────────────────────────────────────────────────────
async function fetchStandings(leagueId,season){
  const key=`${leagueId}_${season}`;
  if(standingsCache[key]) return standingsCache[key];
  try{const res=await apiFetch(`/standings?league=${leagueId}&season=${season}`);
    const data=safeGet(res,"response",0,"league","standings",0)||[];
    standingsCache[key]=data;return data;
  }catch{return[];}
}

function renderStandingsTable(standings,homeId,awayId){
  if(!standings||!standings.length) return`<div class="standings-loading">Keine Tabellendaten</div>`;
  return`<table class="standings-table"><thead><tr><th>Team</th><th>Sp</th><th>S</th><th>U</th><th>N</th><th>Tor+</th><th>Tor-</th><th>Diff</th><th>Pkt</th></tr></thead>
  <tbody>${standings.map((row,i)=>{
    const hi=row.team?.id===homeId||row.team?.id===awayId;
    const gf=safeGet(row,"all","goals","for")??0;
    const ga=safeGet(row,"all","goals","against")??0;
    const diff=gf-ga;
    const diffColor=diff>0?"#22c55e":diff<0?"#ef4444":"#666";
    return`<tr class="${hi?"highlighted":""}">
      <td><span class="pos-num">${row.rank||i+1}</span><span class="team-name-cell">${row.team?.name||"?"}</span></td>
      <td>${safeGet(row,"all","played")??0}</td>
      <td>${safeGet(row,"all","win")??0}</td>
      <td>${safeGet(row,"all","draw")??0}</td>
      <td>${safeGet(row,"all","lose")??0}</td>
      <td><span class="gf">${gf}</span></td>
      <td><span class="ga">${ga}</span></td>
      <td style="color:${diffColor};font-weight:700">${diff>0?"+":""}${diff}</td>
      <td class="pts-cell">${row.points??"-"}</td>
    </tr>`;
  }).join("")}</tbody></table>`;
}

  1:"William Hill",2:"Bwin",3:"Unibet",4:"Betclic",5:"Betway",

  36:"WilliamHill US",37:"Caesars",38:"BetMGM",39:"Barstool",40:"Unibet US",
};

// Bookmakers relevant for German market (in priority order)
const DE_RELEVANT_BOOKMAKERS = [8,2,3,16,5,17,1,11];
const DE_RELEVANT_NAMES = {8:"Bet365",2:"Bwin",3:"Unibet",16:"888Sport",5:"Betway",17:"Betfair",1:"William Hill",11:"Ladbrokes"};

function analyzeBookmakers(pmOdds){
  if(!pmOdds||!pmOdds.length) return{hasBet365:false,availableIds:[],bestAlternative:null,allNames:[],displayOdds:null,oddsSource:null};
  const availableIds=pmOdds.map(b=>b.id);
  const hasBet365=availableIds.includes(BOOKMAKER_ID);
  const allNames=pmOdds.map(b=>KNOWN_BOOKMAKERS[b.id]||`BM#${b.id}`);
  const bestAlt=DE_RELEVANT_BOOKMAKERS.filter(id=>id!==BOOKMAKER_ID&&availableIds.includes(id))[0]||null;
  const bestAltName=bestAlt?DE_RELEVANT_NAMES[bestAlt]:null;

  // Extract 1X2 odds - prefer Bet365, fall back to any available bookmaker
  let displayOdds=null, oddsSource=null;
  const bmPriority=[BOOKMAKER_ID,...DE_RELEVANT_BOOKMAKERS,...availableIds];
  const seen=new Set();
  const orderedBms=bmPriority.filter(id=>{if(seen.has(id))return false;seen.add(id);return availableIds.includes(id);});

  for(const bmId of orderedBms){
    const bm=pmOdds.find(b=>b.id===bmId);
    if(!bm) continue;
    const match1x2=bm.bets?.find(b=>b.name==="Match Winner");
    if(!match1x2) continue;
    const h=match1x2.values?.find(v=>v.value==="Home");
    const d=match1x2.values?.find(v=>v.value==="Draw");
    const a=match1x2.values?.find(v=>v.value==="Away");
    if(h||d||a){
      displayOdds={
        home:h?parseFloat(h.odd):null,
        draw:d?parseFloat(d.odd):null,
        away:a?parseFloat(a.odd):null
      };
      oddsSource=KNOWN_BOOKMAKERS[bmId]||`BM#${bmId}`;
      break;
    }
  }

  // Also get Over/Under and BTTS from best available bookmaker
  let overUnderOdds=null, bttsOdds=null;
  for(const bmId of orderedBms){
    const bm=pmOdds.find(b=>b.id===bmId);
    if(!bm) continue;
    if(!overUnderOdds){
      const ou=bm.bets?.find(b=>b.name==="Goals Over/Under");
      if(ou){
        const o25=ou.values?.find(v=>v.value==="Over 2.5");
        const u25=ou.values?.find(v=>v.value==="Under 2.5");
        if(o25||u25) overUnderOdds={over25:o25?parseFloat(o25.odd):null,under25:u25?parseFloat(u25.odd):null};
      }
    }
    if(!bttsOdds){
      const btts=bm.bets?.find(b=>b.name==="Both Teams Score");
      if(btts){
        const y=btts.values?.find(v=>v.value==="Yes");
        const n=btts.values?.find(v=>v.value==="No");
        if(y||n) bttsOdds={yes:y?parseFloat(y.odd):null,no:n?parseFloat(n.odd):null};
      }
    }
    if(overUnderOdds&&bttsOdds) break;
  }

  return{hasBet365,availableIds,bestAlternative:bestAltName,allNames,displayOdds,oddsSource,overUnderOdds,bttsOdds,
    // keep backward compat
    bet365Odds:hasBet365?displayOdds:null};
}

function renderBookmakerSummary(data){
  const total=data.length;
  const withBet365=data.filter(d=>analyzeBookmakers(d.pmOdds).hasBet365).length;
  const withAnyOdds=data.filter(d=>d.pmOdds&&d.pmOdds.length>0).length;
  const withNone=total-withAnyOdds;

  // Count alternative bookmakers
  const bmCounts={};
  data.forEach(d=>{
    (d.pmOdds||[]).forEach(bm=>{
      if(bm.id!==BOOKMAKER_ID) bmCounts[bm.id]=(bmCounts[bm.id]||0)+1;
    });
  });
  const topAlts=Object.entries(bmCounts).sort((a,b)=>b[1]-a[1]).slice(0,3)
    .map(([id,cnt])=>`${KNOWN_BOOKMAKERS[id]||`BM#${id}`}: ${cnt}`).join(" · ");

  return`<div style="background:#111;border:1px solid #1a1a1a;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-family:'JetBrains Mono',monospace;font-size:11px;display:flex;gap:16px;flex-wrap:wrap">
    <div>Spiele heute: <span style="color:#f0f0f0;font-weight:700">${total}</span></div>
    <div>Bet365 verfügbar: <span style="color:${withBet365>0?"#22c55e":"#ef4444"};font-weight:700">${withBet365}/${total}</span></div>
    <div>Beliebige Quoten: <span style="color:#f59e0b;font-weight:700">${withAnyOdds}/${total}</span></div>
    ${topAlts?`<div style="color:#444">Alternativ: ${topAlts}</div>`:""}
  </div>`;
}

async function loadPreMatch(){
  const pmStatus=document.getElementById("pm-status");
  const pmTop3=document.getElementById("pm-top3");
  const pmList=document.getElementById("pm-list");
  pmStatus.innerHTML=`<div style="color:#3b82f6;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:12px"><span class="spin">⟳</span> Heutige Spiele werden geladen...</div>`;
  pmTop3.innerHTML="";pmList.innerHTML="";

  try{
    // Use 'next' endpoint which has better CORS support than date-based queries
    const fixturesRes=await apiFetch(`/fixtures?next=50`);
    // Use local date to avoid UTC offset issues
    const now=new Date();
    const localToday=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
    const localDates=[];
    for(let i=0;i<3;i++){
      const d=new Date(now);d.setDate(d.getDate()+i);
      localDates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`);
    }

    const fixtures=(fixturesRes.response||[]).filter(f=>{
      const s=safeGet(f,"fixture","status","short");
      // API date is in local time of the match location, extract date part
      const fixtureDate=(safeGet(f,"fixture","date")||"").substring(0,10);
      return["NS","TBD"].includes(s)&&localDates.includes(fixtureDate);
    });

    if(!fixtures.length){
      pmStatus.innerHTML=`<div class="pm-empty">Keine anstehenden Spiele für die nächsten 3 Tage</div>`;
      return;
    }
    pmStatus.innerHTML=`<div style="color:#3b82f6;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:12px"><span class="spin">⟳</span> ${fixtures.length} Spiele (nächste 3 Tage) · Daten werden geladen...</div>`;

    // Step 1: Check Bet365 odds for ALL fixtures (1 request each, with delay)
    pmStatus.innerHTML=`<div style="color:#3b82f6;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:12px">
      <span class="spin">⟳</span> Schritt 1/2: Bet365-Verfügbarkeit prüfen für ${fixtures.length} Spiele...</div>`;

    const bet365Fixtures = [];
    for(let i=0;i<fixtures.length;i++){
      const fix=fixtures[i];
      const id=safeGet(fix,"fixture","id");
      const homeName=safeGet(fix,"teams","home","name")||"?";
      const awayName=safeGet(fix,"teams","away","name")||"?";
      pmStatus.innerHTML=`<div style="color:#3b82f6;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:12px">
        <span class="spin">⟳</span> Bet365-Check ${i+1}/${fixtures.length}: ${homeName} vs ${awayName}...</div>`;
      try{
        const oddsRes = await apiFetch(`/odds?fixture=${id}`,true);
        const bookmakers = oddsRes.response?.[0]?.bookmakers||oddsRes.response||[];
        const hasBet365 = bookmakers.some(b=>b.id===BOOKMAKER_ID);
        if(hasBet365){
          bet365Fixtures.push({fix, pmOddsData: bookmakers});
        }
      }catch(e){ /* skip on error */ }
      await new Promise(r=>setTimeout(r,400)); // 400ms delay between odds checks
    }

    pmStatus.innerHTML=`<div style="color:#22c55e;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:12px">
      ✓ ${bet365Fixtures.length} Bet365-Spiele gefunden von ${fixtures.length} – Schritt 2/2: Details werden geladen...</div>`;

    if(!bet365Fixtures.length){
      pmStatus.innerHTML=`<div class="pm-empty">Keine Bet365-Spiele für heute/morgen gefunden</div>`;
      return;
    }

    const analyzed=[];
    for(let i=0;i<bet365Fixtures.length;i++){
      const {fix, pmOddsData} = bet365Fixtures[i];
      pmStatus.innerHTML=`<div style="color:#3b82f6;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:12px">
        <span class="spin">⟳</span> Schritt 2/2 – Spiel ${i+1}/${bet365Fixtures.length}: ${safeGet(fix,"teams","home","name")||"?"} vs ${safeGet(fix,"teams","away","name")||"?"}...</div>`;
      const result = await (async (fix, pmOddsData)=>{
      const id=safeGet(fix,"fixture","id");
      const hId=safeGet(fix,"teams","home","id");
      const aId=safeGet(fix,"teams","away","id");
      const lid=safeGet(fix,"league","id");
      const season=safeGet(fix,"league","season");
      let h2h=[],homeTeamStats={},awayTeamStats={},injuries=[],predictions={},referee=safeGet(fix,"fixture","referee")||null,pmOdds=pmOddsData||[];

      const delay=ms=>new Promise(r=>setTimeout(r,ms));
      const safeFetch=async fn=>{try{return await fn();}catch{return{response:[]}}};
      try{
        // Sequential with delays to avoid proxy rate limits
        const h2hRes  = await safeFetch(()=>apiFetch(`/fixtures/headtohead?h2h=${hId}-${aId}&last=6`,true));
        await delay(250);
        const htRes   = await safeFetch(()=>apiFetch(`/teams/statistics?team=${hId}&season=${season}&league=${lid}`,true));
        await delay(250);
        const atRes   = await safeFetch(()=>apiFetch(`/teams/statistics?team=${aId}&season=${season}&league=${lid}`,true));
        await delay(250);
        const predRes = await safeFetch(()=>apiFetch(`/predictions?fixture=${id}`,true));
        // odds already pre-fetched in step 1

        h2h           = h2hRes.response||[];
        homeTeamStats = htRes.response||{};
        awayTeamStats = atRes.response||{};
        predictions   = predRes.response?.[0]||{};
        // pmOdds already set from pre-fetched Bet365 data
        // injuries skipped to reduce requests
      }catch{}

      return{fix,h2h,homeTeamStats,awayTeamStats,injuries,predictions,referee,pmOdds};
      })(fix, pmOddsData);
      analyzed.push(result);
      await new Promise(r=>setTimeout(r,500)); // 500ms between full detail loads
    }

    // Analyze and score each fixture
    const scored=analyzed.map(d=>{
      const {fix,h2h,homeTeamStats,awayTeamStats,injuries,predictions,referee,pmOdds=[]}=d;
      const homeName=safeGet(fix,"teams","home","name")||"?";
      const awayName=safeGet(fix,"teams","away","name")||"?";
      const hGoalsAvg=parseFloat(safeGet(homeTeamStats,"goals","for","average","total")||0)||0;
      const aGoalsAvg=parseFloat(safeGet(awayTeamStats,"goals","for","average","total")||0)||0;
      const hConcAvg=parseFloat(safeGet(homeTeamStats,"goals","against","average","total")||0)||0;
      const aConcAvg=parseFloat(safeGet(awayTeamStats,"goals","against","average","total")||0)||0;
      const hHomeWin=safeGet(homeTeamStats,"fixtures","wins","home")||0;
      const hHomePlayed=safeGet(homeTeamStats,"fixtures","played","home")||1;
      const hForm=parseForm(safeGet(homeTeamStats,"form")||"");
      const aForm=parseForm(safeGet(awayTeamStats,"form")||"");
      const hFS=formScore(hForm),aFS=formScore(aForm);
      const homeWinProb=parseFloat(safeGet(predictions,"predictions","percent","home"))||0;
      const awayWinProb=parseFloat(safeGet(predictions,"predictions","percent","away"))||0;
      const drawProb=parseFloat(safeGet(predictions,"predictions","percent","draws"))||0;
      const predWinner=safeGet(predictions,"predictions","winner","name")||null;

      // H2H stats
      const h2hOver=h2h.filter(m=>{const hg=safeGet(m,"goals","home")??0;const ag=safeGet(m,"goals","away")??0;return hg+ag>2.5}).length;
      const h2hBtts=h2h.filter(m=>(safeGet(m,"goals","home")??0)>0&&(safeGet(m,"goals","away")??0)>0).length;

      // Key injuries
      const keyInjuries=injuries.filter(i=>{
        const reason=safeGet(i,"player","reason")||"";
        return reason.toLowerCase().includes("missing")||reason.toLowerCase().includes("injured")||reason.toLowerCase().includes("doubtful");
      }).slice(0,4);

      // Referee cards stats (from current fixture data)
      const refName=referee;

      // Scenarios
      const pmScenarios=[];
      const homeWinRate=hHomePlayed>0?(hHomeWin/hHomePlayed):0;

      // HOME FORTRESS
      if(homeWinRate>=0.7&&hGoalsAvg>=1.8){
        pmScenarios.push({sc:PM_SC.HOME_FORTRESS,
          bet:`${homeName} Sieg`,
          reason:`${homeName} gewinnt ${Math.round(homeWinRate*100)}% der Heimspiele bei ${safeFixed(hGoalsAvg)} Toren/Spiel.`,
          valueScore:calcValueScore(1.8,homeWinRate,hFS*1.5,h2hOver*3,10)});
      }

      // FORM CLASH
      if(Math.abs(hFS-aFS)>=6){
        const strongTeam=hFS>aFS?homeName:awayName;
        const weakTeam=hFS>aFS?awayName:homeName;
        const ft=hFS>aFS?"home":"away";
        pmScenarios.push({sc:PM_SC.FORM_CLASH,
          bet:`${strongTeam} Sieg oder DC`,
          reason:`${strongTeam} (Form ${hFS>aFS?hFS:aFS}/15) trifft auf ${weakTeam} in Formkrise (${hFS>aFS?aFS:hFS}/15).`,
          valueScore:calcValueScore(1.75,0.65,Math.abs(hFS-aFS)*2,0,5)});
      }

      // GOAL FEST
      const combinedGoals=parseFloat(hGoalsAvg)+parseFloat(aGoalsAvg)+parseFloat(hConcAvg)+parseFloat(aConcAvg);
      if(combinedGoals>=5&&h2hOver>=3){
        pmScenarios.push({sc:PM_SC.GOAL_FEST,
          bet:`Over 2.5 Tore · BTTS–Ja`,
          reason:`Kombinierter Tordurchschnitt: ${safeFixed(combinedGoals)} Tore. H2H Over 2.5: ${h2hOver}/6 Spielen.`,
          valueScore:calcValueScore(1.65,0.75,0,h2hOver*5,8)});
      }

      // DEFENSIVE BLOCK
      if(parseFloat(hGoalsAvg)<=1.0&&parseFloat(aGoalsAvg)<=1.0&&h2hOver<=1){
        pmScenarios.push({sc:PM_SC.DEFENSIVE_BLOCK,
          bet:`Under 2.5 Tore · Under 1.5 Tore`,
          reason:`Beide Teams torschwach (${hGoalsAvg}/${aGoalsAvg} Tore/Spiel). H2H selten >2.5 (${h2hOver}/6).`,
          valueScore:calcValueScore(1.7,0.68,0,(6-h2hOver)*3,5)});
      }

      // KEY PLAYER MISSING
      if(keyInjuries.length>0){
        pmScenarios.push({sc:PM_SC.KEY_PLAYER_MISSING,
          bet:`Over/Under anpassen je nach fehlendem Team`,
          reason:`${keyInjuries.length} Schlüsselspieler fraglich: ${keyInjuries.map(i=>safeGet(i,"player","name")||"?").join(", ")}.`,
          valueScore:45});
      }

      // H2H PATTERN
      if(h2h.length>=4){
        if(h2hBtts>=4){
          pmScenarios.push({sc:PM_SC.H2H_PATTERN,
            bet:`BTTS–Ja`,
            reason:`In ${h2hBtts}/6 der letzten Duelle trafen beide Teams. Starkes historisches Muster.`,
            valueScore:calcValueScore(1.8,h2hBtts/6,0,h2hBtts*4,5)});
        } else if(h2hBtts<=1){
          pmScenarios.push({sc:PM_SC.H2H_PATTERN,
            bet:`BTTS–Nein`,
            reason:`In nur ${h2hBtts}/6 Duellen trafen beide Teams. Historisch torarm.`,
            valueScore:calcValueScore(1.7,1-(h2hBtts/6),0,(6-h2hBtts)*3,5)});
        }
      }

      const maxVS=pmScenarios.length?Math.max(...pmScenarios.map(s=>s.valueScore)):0;

      return{...d,homeName,awayName,hGoalsAvg,aGoalsAvg,hForm,aForm,hFS,aFS,
        homeWinProb,awayWinProb,drawProb,predWinner,h2hOver,h2hBtts,
        keyInjuries,refName,pmScenarios,maxVS,pmOdds};
    });

    allPmData=scored;
    document.getElementById("tab-pm-count").textContent=scored.length;
    pmStatus.innerHTML="";
    renderPreMatch(scored);

  }catch(err){
    pmStatus.innerHTML=`<div style="color:#ef4444;font-family:'JetBrains Mono',monospace;font-size:12px">⚠ ${err.message}</div>`;
  }
}

  else if(notificationsEnabled){btn.className="hbtn on";btn.textContent="🔔 Browser"}

async function toggleNotifications(){
  if(notificationsEnabled){notificationsEnabled=false;updateNotifBtn();return;}
  const topic=prompt("ntfy.sh Setup:\n\n1. Installiere die 'ntfy' App\n2. Gib deinen Topic-Namen ein:\n   (z.B. simen-livescout-2024)\n\nLeer lassen für Browser-Only:");
  if(topic===null) return;
  if(topic.trim()){
    ntfyTopic=topic.trim().toLowerCase().replace(/[^a-z0-9-_]/g,"");
    localStorage.setItem("ntfy_topic",ntfyTopic);
    try{
      await sendNtfy("Live Scout aktiv","Notifications eingerichtet! Du erhältst Alerts sobald Wettchancen erkannt werden.","tada");
      notificationsEnabled=true;
      alert(`Erfolgreich!\n\nntfy App -> Topic abonnieren:\n"${ntfyTopic}"`);
    }catch(e){alert("⚠ ntfy Fehler: "+e.message);return;}
  } else {
    ntfyTopic="";localStorage.removeItem("ntfy_topic");
    const perm=await Notification.requestPermission();
    if(perm==="granted"){notificationsEnabled=true;new Notification("⚡ Live Scout aktiv",{body:"Browser-Notifications aktiviert."})}
    else{alert("Nicht erlaubt.");return;}
  }
  updateNotifBtn();
}

async function sendNtfy(title,body,tags="soccer"){
  if(!ntfyTopic) return;
  // Strip non-ASCII characters from headers (ISO-8859-1 requirement)
  const safeTitle=title.replace(/[^\x00-\x7F]/g,"").trim()||"Live Scout Alert";
  const safeTags=tags.replace(/[^\x00-\x7F]/g,"").trim()||"soccer";
  await fetch(`https://ntfy.sh/${ntfyTopic}`,{
    method:"POST",
    headers:{
      "Title": safeTitle,
      "Tags": safeTags,
      "Priority": "high",
      "Content-Type": "text/plain; charset=utf-8",
    },
    body: new TextEncoder().encode(body)
  });
}

async function sendAlert(match,trigger){
  if(!notificationsEnabled) return;
  const fixId=safeGet(match,"fixture","id");
  const key=`${fixId}_${trigger.scenario.id}`;
  if(notifiedMatches[key]) return;
  notifiedMatches[key]=true;
  const hN=safeGet(match,"teams","home","name")||"?";
  const aN=safeGet(match,"teams","away","name")||"?";
  const hG=safeGet(match,"goals","home")??0;
  const aG=safeGet(match,"goals","away")??0;
  const min=safeGet(match,"fixture","status","elapsed")||"?";
  const league=safeGet(match,"league","name")||"";
  const bestO=bestOdd(trigger.oddsData);
  const oddsText=bestO?` | Quote ${bestO.odd.toFixed(2)}`:"";
  const vsText=trigger.valueScore?` | Score ${trigger.valueScore}/100`:"";
  const title=`${hN} vs ${aN} – ${trigger.scenario.id.replace(/_/g," ")}`;
  const body=`${hG}:${aG} (${min}') | ${league}\n${trigger.recBet}${oddsText}${vsText}`;
  if(ntfyTopic) await sendNtfy(title,body,"soccer,warning");
  else if(Notification.permission==="granted"){const n=new Notification(title,{body,tag:key});setTimeout(()=>n.close(),8000);}
}

  if(!notificationsEnabled||!match.freeRec||match.freeRec.confidence!=="HOCH") return;

async function addHistoryEntry(match,trigger,isFree=false){
  const fixId=safeGet(match,"fixture","id");
  const eId=isFree?`${fixId}_FREE`:`${fixId}_${trigger.scenario.id}`;
  const bestO=bestOdd(trigger.oddsData);
  const entry={id:eId,fixId,timestamp:new Date().toISOString(),
    homeName:safeGet(match,"teams","home","name")||"?",awayName:safeGet(match,"teams","away","name")||"?",
    league:safeGet(match,"league","name")||"?",country:safeGet(match,"league","country")||"?",
    scoreAtAlert:`${safeGet(match,"goals","home")??0}:${safeGet(match,"goals","away")??0}`,
    minute:safeGet(match,"fixture","status","elapsed")||0,
    scenario:isFree?{id:"FREE",label:"💡 KI Empfehlung",color:"#f0f0f0",bg:"#111"}:trigger.scenario,
    bet:isFree?trigger.bet:trigger.recBet,
    valueScore:trigger.valueScore||null,
    bestOdd:bestO?bestO.odd:null,bestOddLabel:bestO?bestO.label:null,
    finalScore:null,result:"open"};

  // Try Supabase first, fall back to localStorage
  const saved = await sbSaveEntry(entry);
  if(!saved){
    const entries=loadHistory();
    if(!entries.find(e=>e.id===eId)){
      entries.unshift(entry);
      saveHistory(entries.slice(0,200));
    }
  }
  updateHistTabCount();
}

function evaluateResult(entry,fH,fA){
  const bet=(entry.bet||"").toLowerCase();
  const[aH,aA]=(entry.scoreAtAlert||"0:0").split(":").map(Number);
  const homeWon=fH>fA,awayWon=fA>fH,draw=fH===fA;
  if(bet.includes("dc heim")||bet.includes("heim/x")||bet.includes("home/draw")) return(homeWon||draw)?"won":"lost";
  if(bet.includes("dc x/gast")||bet.includes("x/gast")||bet.includes("draw/away")) return(awayWon||draw)?"won":"lost";
  if(bet.includes("sieg")&&(bet.includes("heim")||bet.includes("home"))) return homeWon?"won":"lost";
  if(bet.includes("sieg")&&(bet.includes("gast")||bet.includes("away"))) return awayWon?"won":"lost";
  if(bet.includes("over")||bet.includes("btts")){
    const m=bet.match(/over\s*([\d.]+)/);
    if(m) return(fH+fA)>parseFloat(m[1])?"won":"lost";
    if(bet.includes("btts")) return(fH>0&&fA>0)?"won":"lost";
    return(fH+fA)>(aH+aA)?"won":"lost";
  }
  if(bet.includes("ausgleich")){const loser=aH<aA?"home":"away";return loser==="home"?fH>=fA:fA>=fH?"won":"lost";}
  return"unknown";
}

    return`<div class="hist-entry ${e.result}">
      <div class="hist-top"><div class="hist-match">${e.homeName} vs ${e.awayName}</div>
      <div class="hist-result-badge ${e.result}">${labels[e.result]||"?"}</div></div>
      <div class="hist-meta">${e.country} · ${e.league} · ${ds}</div>
      <span class="hist-scenario" style="background:${e.scenario.bg||"#111"};color:${e.scenario.color||"#aaa"};border:1px solid ${e.scenario.color||"#333"}33">${e.scenario.label}</span>
      ${e.valueScore?`<span style="font-size:11px;font-family:'JetBrains Mono',monospace;color:${vsColor};margin-left:6px">Score ${e.valueScore}/100</span>`:""}
      <div class="hist-bet">→ ${e.bet}</div>

        ${e.bestOdd?`<span class="hist-odds-chip ${oc}">${e.bestOdd.toFixed(2)} ${e.bestOddLabel||""}</span>`:""}
      </div>
      ${e.result==="open"?`<div class="hist-note">Wird automatisch aktualisiert wenn das Spiel endet</div>`:""}
    </div>`;
  }).join("");

      const bestO=bestOdd(fr.oddsData);const verdict=bestO?oddsVerdict(bestO.odd):null;
      freeRecHtml=`<div class="free-rec">
        <div class="free-rec-header">
          <span class="free-rec-label">KI BESTE WETTE</span>
          <span class="conf-badge ${confCls}">${fr.confidence}</span>
          ${fr.valueScore?`<span style="font-size:12px;font-weight:900;font-family:'JetBrains Mono',monospace;color:${valueScoreColor(fr.valueScore)}">${fr.valueScore}/100</span>`:""}
        </div>
        <div class="free-rec-bet" style="color:#f0f0f0">${fr.bet}</div>
        <div class="free-rec-reason">${fr.reason||""}</div>
        <div class="free-rec-odds">${renderOddsChips(fr.oddsData)}${verdict?`<span class="odds-verdict ${verdict.cls}">${verdict.text}</span>`:""}</div>
      </div>`;
    }

    // Triggers
    const triggersHtml=m.triggers.length>0?`<div class="triggers">${m.triggers.map(t=>{
      const bestO=bestOdd(t.oddsData);const verdict=bestO?oddsVerdict(bestO.odd):null;
      const sigBadge=t.signal==="weak"?`<span class="signal-badge signal-weak">⚠ Schwach</span>`:`<span class="signal-badge signal-strong">✓ Stark</span>`;
      return`<div class="trigger-item">
        <div class="trigger-header">
          <span class="trigger-badge" style="background:${t.scenario.bg};color:${t.scenario.color};border:1px solid ${t.scenario.color}33">${t.scenario.label}</span>
          ${sigBadge}
          ${t.valueScore?`<span style="font-size:12px;font-weight:900;font-family:'JetBrains Mono',monospace;color:${valueScoreColor(t.valueScore)}">${t.valueScore}</span>`:""}
          <span class="trigger-source">${t.scenario.group==="ai"?"KI":t.scenario.group==="scoreonly"?"Score-Only":"Dein Szenario"}</span>
        </div>
        <div class="trigger-detail">${t.detail}</div>
        <div class="rec-box" style="background:${t.scenario.bg}88;border-color:${t.scenario.color}22">
          <div class="rec-title" style="color:${t.scenario.color}">💡 EMPFEHLUNG</div>
          <div class="rec-bet" style="color:${t.scenario.color}">${t.recBet}</div>
          <div class="rec-reason">${t.reason||""}</div>
          <div class="rec-odds">${renderOddsChips(t.oddsData)}${verdict?`<span class="odds-verdict ${verdict.cls}">${verdict.text}</span>`:""}</div>
        </div>
      </div>`;
    }).join("")}</div>`:"";

    // Obs bar
    let obsHtml="";
    if(minute>=5){
      const hSt=safeGet(m,"_stats",0,"statistics")||[];
      const aSt=safeGet(m,"_stats",1,"statistics")||[];
      const hP=getStat(hSt,"Ball Possession"),aP=getStat(aSt,"Ball Possession");
      const hS=getStat(hSt,"Total Shots"),aS=getStat(aSt,"Total Shots");
      const hSo=getStat(hSt,"Shots on Goal"),aSo=getStat(aSt,"Shots on Goal");
      const hC=getStat(hSt,"Corner Kicks"),aC=getStat(aSt,"Corner Kicks");
      const hasAny=hP>0||hS>0||aS>0||hC>0;
      if(!m.triggers.length&&!m.freeRec){
        obsHtml=`<div class="obs-bar"><div class="obs-dot"></div><span class="obs-label">BEOBACHTUNG</span>
        ${hasAny?`<div class="obs-stats">
          ${hP>0?`<span class="obs-stat">Ball: <span>${hP}%–${aP}%</span></span>`:""}
          <span class="obs-stat">Schüsse: <span>${hS}–${aS}</span></span>
          <span class="obs-stat">Aufs Tor: <span>${hSo}–${aSo}</span></span>
          <span class="obs-stat">Ecken: <span>${hC}–${aC}</span></span>
        </div>`:`<span class="obs-nostats">Stats nicht verfügbar</span>`}
        </div>`;
      }
    }

    return`<div class="match-card ${(m.triggers.length>0||m.freeRec)?"has-alert":""}">
      <div class="match-main">
        <div class="match-league">
          <div class="match-league-left">
            <span>${country.toUpperCase()} · ${league}</span>
            ${!m._hasStats?`<span class="score-only-badge">Score-Only</span>`:""}
          </div>
          <span class="standings-toggle" id="st-btn-${fixId}" onclick="toggleStandings(${fixId})">📊 Tabelle</span>
        </div>
        ${ctxBar}
        <div class="match-row">
          <div class="match-teams"><div class="match-home">${homeName}</div><div class="match-away">${awayName}</div></div>
          <div class="match-score-wrap">
            <div class="match-score">${hGoals} : ${aGoals}</div>
            <div class="match-minute ${isLive?"live":""}">${minLabel}</div>
          </div>
          <div style="flex:1;text-align:right">${logo?`<img class="match-logo" src="${logo}" alt=""/>`:""}</div>
        </div>
        ${triggersHtml}
      </div>
      ${obsHtml}
      ${freeRecHtml}
      <div class="standings-wrap" id="st-${fixId}" data-lid="${lid}" data-season="${season}" data-hid="${homeId}" data-aid="${awayId}">
        <div class="standings-title">TABELLE · ${league}</div>
        <div class="standings-loading">Klicke "Tabelle" um zu laden</div>
      </div>
    </div>`;
  }).join("");
}

// ─── RESULT CHECKER ─────────────────────────────────────────────────────────
async function checkFinishedMatches(){
  // Load open bets from Supabase and check if their matches have ended
  try{
    const openBets = await sbFetch(`/${SB_TABLE}?result=eq.open&limit=50`);
    if(!openBets||!openBets.length) return;

    // Get all fix_ids that are still open
    const openFixIds = [...new Set(openBets.map(b=>b.fix_id))];

    // Fetch final scores for these fixtures
    for(const fixId of openFixIds){
      try{
        const res = await apiFetch(`/fixtures?id=${fixId}`);
        const fix = res.response?.[0];
        if(!fix) continue;
        const status = safeGet(fix,"fixture","status","short");
        // Only process finished matches
        if(!["FT","AET","PEN"].includes(status)) continue;
        const finalHome = safeGet(fix,"goals","home")??0;
        const finalAway = safeGet(fix,"goals","away")??0;
        const finalScore = `${finalHome}:${finalAway}`;
        // Update all open bets for this fixture
        const betsForFix = openBets.filter(b=>b.fix_id===fixId);
        for(const bet of betsForFix){
          const entry = {bet:bet.bet, scoreAtAlert:bet.score_at_alert||"0:0"};
          const result = evaluateResult(entry, finalHome, finalAway);
          await sbUpdateResult(bet.id, finalScore, result);
          console.log(`Updated ${bet.id}: ${finalScore} → ${result}`);
        }
      }catch(e){ console.warn("checkFinishedMatches error for fix",fixId,e.message); }
    }
  }catch(e){ console.warn("checkFinishedMatches failed:",e.message); }
}

// ─── THEME ───────────────────────────────────────────────────────────────────
let isDark=true;
function toggleTheme(){
  isDark=!isDark;
  document.body.classList.toggle('light-mode',!isDark);
  document.getElementById('theme-btn').textContent=isDark?'🌙':'☀️';
  localStorage.setItem('theme',isDark?'dark':'light');
}
// Restore theme
if(localStorage.getItem('theme')==='light'){
  isDark=false;
  document.body.classList.add('light-mode');
  setTimeout(()=>{const b=document.getElementById('theme-btn');if(b)b.textContent='☀️';},0);
}

// ─── FETCH ────────────────────────────────────────────────────────────────────
async function fetchData(){
  const btn=document.getElementById("refresh-btn");
  btn.innerHTML='<span class="spin">⟳</span>';btn.disabled=true;setStatus(null);
  try{
    const fr=await apiFetch("/fixtures?live=all");
    if(fr.errors){const e=Object.values(fr.errors).filter(Boolean);if(e.length){setStatus(e.join(", "),"error");return;}}
    const raw=fr.response||[];
    const fixtures=raw.filter(f=>{const s=safeGet(f,"fixture","status","short");return s&&LIVE_STATUSES.includes(s);});
    if(!fixtures.length){allMatches=[];renderMatches();updateHeader(0);return;}
    setStatus(`${fixtures.length} Live-Spiele · Daten werden geladen...`,"info");
    const limited=fixtures.slice(0,15);

    const enriched=await Promise.all(limited.map(async fix=>{
      try{
        const id=safeGet(fix,"fixture","id");
        const hId=safeGet(fix,"teams","home","id"),aId=safeGet(fix,"teams","away","id");
        const lid=safeGet(fix,"league","id"),season=safeGet(fix,"league","season");
        const [evRes,stRes,odRes,htRes,atRes]=await Promise.all([
          apiFetch(`/fixtures/events?fixture=${id}`),
          apiFetch(`/fixtures/statistics?fixture=${id}`),
          apiFetch(`/odds/live?fixture=${id}`),
          apiFetch(`/teams/statistics?team=${hId}&season=${season}&league=${lid}`,true),
          apiFetch(`/teams/statistics?team=${aId}&season=${season}&league=${lid}`,true),
        ]);
        const statsData=stRes.response||[];
        const eventsData=evRes.response||[];
        const teamStats={home:htRes.response||{},away:atRes.response||{}};
        const hasStats=[...(safeGet(statsData,0,"statistics")||[]),...(safeGet(statsData,1,"statistics")||[])].some(s=>{const v=s?.value;return v!==null&&v!==undefined&&v!==""&&v!=="0"&&v!==0;});
        const bookmakers=safeGet(odRes,"response",0,"bookmakers")||[];
        const triggers=hasStats?analyzeFixture(fix,eventsData,statsData,teamStats):[];
        triggers.forEach(t=>{t.oddsData=extractOdds(bookmakers,t.scenario.id,t.oddsCtx);});
        const freeRec=hasStats?buildFreeRec(fix,statsData,bookmakers,teamStats):null;
        return{...fix,triggers,freeRec,_stats:statsData,_events:eventsData,_hasStats:hasStats,_teamStats:teamStats,_bookmakers:bookmakers};
      }catch{return{...fix,triggers:[],freeRec:null,_stats:[],_events:[],_hasStats:false,_teamStats:null,_bookmakers:[]};}
    }));

    // Score-only analysis for all
    const standingsNeeded=enriched.filter(m=>!m._hasStats);
    const standingsMap={};
    await Promise.all(standingsNeeded.map(async m=>{
      const lid=safeGet(m,"league","id"),season=safeGet(m,"league","season");
      if(!lid) return;
      try{const s=await fetchStandings(lid,season);standingsMap[lid]=s;}catch{}
    }));

    enriched.forEach(m=>{
      const lid=safeGet(m,"league","id");
      const standings=standingsMap[lid]||standingsCache[`${lid}_${safeGet(m,"league","season")}`]||[];
      const soTriggers=analyzeScoreOnly(m,m._events||[],standings);
      const existingIds=new Set(m.triggers.map(t=>t.scenario.id));
      soTriggers.forEach(t=>{if(!existingIds.has(t.scenario.id))m.triggers.push(t);});
      // Attach odds to score-only triggers
      soTriggers.forEach(t=>{if(!t.oddsData)t.oddsData=extractOdds(m._bookmakers||[],t.scenario.id,t.oddsCtx);});
    });

    allMatches=enriched;

    // Notifications + history
    // Process matches - notifications + history
    for(const m of allMatches){
      for(const t of m.triggers){
        await sendAlert(m,t);
        await addHistoryEntry(m,t,false);
      }
      if(m.freeRec&&m.freeRec.confidence==="HOCH"){
        await sendFreeAlert(m);
        await addHistoryEntry(m,m.freeRec,true);
      }
    }
    cleanupNotified();
    // Update finished match results in Supabase
    checkFinishedMatches();

    document.getElementById("tab-live-count").textContent=allMatches.length;
    updateHistTabCount();
    renderMatches();
    updateHeader(fixtures.length);

    const withStats=enriched.filter(m=>m._hasStats).length;
    setStatus(null);
    setStatus(`${withStats} volle Stats · ${enriched.length-withStats} Score-Only`,"info");
    setTimeout(()=>setStatus(null),5000);

  }catch(err){setStatus("Verbindungsfehler: "+err.message,"error");}
  finally{
    btn.innerHTML="↻ Refresh";btn.disabled=false;
    document.querySelector('[data-filter="ALL"]').textContent=`Alle (${allMatches.length})`;
    document.querySelector('[data-filter="ALERTS"]').textContent=`🚨 Alerts (${allMatches.filter(m=>m.triggers.length>0||m.freeRec).length})`;
  }
}

initSupabase().then(()=>{
  fetchData();
  setInterval(fetchData,60000);
  // Check finished matches every 5 minutes
  setInterval(checkFinishedMatches, 5*60*1000);
});
updateNotifBtn();
updateHistTabCount();
</script>
