<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚡ Live Scout</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080808; color: #f0f0f0; font-family: 'Barlow Condensed', sans-serif; min-height: 100vh; }

    #header { background: #0a0a0a; border-bottom: 1px solid #1a1a1a; padding: 14px 20px; position: sticky; top: 0; z-index: 100; }
    #header-inner { display: flex; align-items: center; justify-content: space-between; max-width: 720px; margin: 0 auto; }
    #title { font-size: 22px; font-weight: 900; letter-spacing: 0.05em; line-height: 1; }
    #subtitle { font-size: 11px; color: #444; font-family: 'JetBrains Mono', monospace; margin-top: 3px; }
    #header-right { display: flex; gap: 10px; align-items: center; }
    #alert-badge { background: #22c55e; color: #000; border-radius: 20px; padding: 4px 12px; font-size: 13px; font-weight: 900; display: none; animation: pulse 2s infinite; }
    #refresh-btn { background: #1a1a1a; border: 1px solid #2a2a2a; color: #888; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 12px; font-family: 'JetBrains Mono', monospace; }

    #notif-btn { background: #1a1a1a; border: 1px solid #2a2a2a; color: #555; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 12px; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
    #notif-btn.on  { background: #052010; border-color: #22c55e44; color: #22c55e; }
    #notif-btn.off { background: #1a0505; border-color: #ef444433; color: #ef4444; }
    .section-header { font-size: 10px; color: #2a2a2a; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; margin: 12px 0 6px; }
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
    #filters-ai { margin-bottom: 14px; }

    .filter-btn { background: transparent; border: 1px solid #1a1a1a; color: #555; border-radius: 8px; padding: 5px 11px; cursor: pointer; font-size: 11px; font-family: 'JetBrains Mono', monospace; transition: all 0.15s; white-space: nowrap; }
    .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #333; }
    .filter-btn.active.col-red    { color: #ef4444; border-color: #ef444455; }
    .filter-btn.active.col-amber  { color: #f59e0b; border-color: #f59e0b55; }
    .filter-btn.active.col-blue   { color: #3b82f6; border-color: #3b82f655; }
    .filter-btn.active.col-green  { color: #10b981; border-color: #10b98155; }
    .filter-btn.active.col-lime   { color: #22c55e; border-color: #22c55e55; }
    .filter-btn.active.col-purple { color: #a855f7; border-color: #a855f755; }
    .filter-btn.active.col-pink   { color: #ec4899; border-color: #ec489955; }
    .filter-btn.active.col-cyan   { color: #06b6d4; border-color: #06b6d455; }
    .filter-btn.active.col-orange { color: #f97316; border-color: #f9731655; }

    /* MATCH CARD */
    .match-card { background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 14px; margin-bottom: 10px; overflow: hidden; transition: border-color 0.3s, box-shadow 0.3s; }
    .match-card.has-alert { border-color: #22c55e33; box-shadow: 0 0 18px #22c55e0a; }
    .match-main { padding: 16px 18px; }
    .match-league { font-size: 10px; color: #444; margin-bottom: 9px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; display: flex; justify-content: space-between; align-items: center; }
    .standings-toggle { cursor: pointer; color: #333; font-size: 10px; padding: 2px 7px; border: 1px solid #1f1f1f; border-radius: 4px; transition: all 0.15s; user-select: none; }
    .standings-toggle:hover { color: #555; border-color: #333; }
    .match-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .match-teams { flex: 1; }
    .match-home { font-size: 15px; font-weight: 700; color: #f0f0f0; }
    .match-away { font-size: 13px; color: #666; }
    .match-score-wrap { text-align: center; margin: 0 14px; }
    .match-score { font-size: 24px; font-weight: 900; color: #fff; line-height: 1; letter-spacing: 0.08em; }
    .match-minute { margin-top: 4px; font-size: 11px; font-family: 'JetBrains Mono', monospace; color: #444; font-weight: 700; }
    .match-minute.live { color: #22c55e; }
    .match-logo { width: 26px; height: 26px; opacity: 0.5; }

    /* FREE RECOMMENDATION BOX - shown for every match */
    .free-rec { border-top: 1px solid #141414; padding: 10px 18px; background: #0a0a0a; }
    .free-rec-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .free-rec-label { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #2a2a2a; letter-spacing: 0.08em; }
    .free-rec-confidence { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 1px 7px; border-radius: 4px; font-weight: 700; }
    .conf-high   { background: #052010; color: #22c55e; }
    .conf-medium { background: #1a1205; color: #f59e0b; }
    .conf-low    { background: #111;    color: #444; }
    .free-rec-bet { font-size: 14px; font-weight: 900; letter-spacing: 0.02em; margin-bottom: 3px; }
    .free-rec-reason { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: #555; line-height: 1.4; margin-bottom: 6px; }
    .free-rec-odds { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

    /* SCENARIO TRIGGERS */
    .triggers { border-top: 1px solid #181818; padding: 12px 18px; display: flex; flex-direction: column; gap: 12px; }
    .trigger-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .trigger-badge { display: inline-block; border-radius: 5px; padding: 2px 9px; font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
    .signal-badge { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 1px 6px; border-radius: 4px; }
    .signal-strong { background: #052010; color: #22c55e; border: 1px solid #22c55e33; }
    .signal-weak   { background: #1a1205; color: #f59e0b; border: 1px solid #f59e0b33; }
    .trigger-source { font-size: 10px; color: #2a2a2a; font-family: 'JetBrains Mono', monospace; }
    .trigger-detail { font-size: 11px; color: #666; font-family: 'JetBrains Mono', monospace; line-height: 1.5; margin-bottom: 6px; }
    .rec-box { border-radius: 8px; padding: 10px 12px; border: 1px solid; margin-top: 2px; }
    .rec-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 5px; opacity: 0.7; }
    .rec-bet { font-size: 15px; font-weight: 900; letter-spacing: 0.02em; margin-bottom: 4px; }
    .rec-reason { font-size: 11px; font-family: 'JetBrains Mono', monospace; opacity: 0.65; line-height: 1.4; margin-bottom: 7px; }
    .rec-odds { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

    /* ODDS CHIPS */
    .odds-chip { display: inline-flex; align-items: center; gap: 4px; border-radius: 6px; padding: 4px 10px; font-size: 13px; font-weight: 900; font-family: 'JetBrains Mono', monospace; border: 1px solid transparent; white-space: nowrap; }
    .odds-chip.good { background: #052010; color: #22c55e; border-color: #22c55e44; }
    .odds-chip.ok   { background: #1a1205; color: #f59e0b; border-color: #f59e0b44; }
    .odds-chip.low  { background: #151515; color: #444;    border-color: #222; }
    .odds-chip.none { background: #111;    color: #2a2a2a; border-color: #1a1a1a; font-size: 10px; }
    .odds-chip .chip-label { font-size: 9px; opacity: 0.6; }
    .odds-verdict { font-size: 10px; font-family: 'JetBrains Mono', monospace; }
    .odds-verdict.good { color: #22c55e; }
    .odds-verdict.ok   { color: #f59e0b; }
    .odds-verdict.low  { color: #555; }

    /* OBSERVATION BAR */
    .obs-bar { border-top: 1px solid #111; padding: 8px 18px; background: #090909; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .obs-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; flex-shrink: 0; }
    .obs-label { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #2a2a2a; letter-spacing: 0.05em; }
    .obs-stats { display: flex; gap: 8px; flex-wrap: wrap; }
    .obs-stat { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #333; }
    .obs-stat span { color: #555; }
    .obs-nostats { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #222; font-style: italic; }

    /* STANDINGS */
    .standings-wrap { display: none; border-top: 1px solid #111; background: #080808; padding: 12px 18px; }
    .standings-wrap.open { display: block; }
    .standings-title { font-size: 10px; color: #333; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .standings-table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .standings-table th { color: #333; font-weight: 400; text-align: right; padding: 3px 6px; border-bottom: 1px solid #111; font-size: 9px; letter-spacing: 0.05em; }
    .standings-table th:first-child { text-align: left; }
    .standings-table td { color: #777; text-align: right; padding: 4px 6px; border-bottom: 1px solid #0d0d0d; }
    .standings-table td:first-child { text-align: left; }
    .standings-table tr.highlighted td { color: #f0f0f0; background: #141414; }
    .standings-table tr.highlighted td:first-child { border-left: 2px solid #22c55e; padding-left: 4px; }
    .pos-num { color: #333; margin-right: 5px; }
    .team-name-cell { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: bottom; }
    .gf { color: #22c55e; }
    .ga { color: #ef4444; }
    .pts-cell { font-weight: 700; color: #aaa; }
    .standings-loading { color: #2a2a2a; font-size: 11px; font-family: 'JetBrains Mono', monospace; padding: 8px 0; }

    #status-box { border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; font-family: 'JetBrains Mono', monospace; font-size: 12px; display: none; }
    #status-box.error { background: #1a0505; border: 1px solid #ef444433; color: #ef4444; }
    #status-box.info  { background: #05101a; border: 1px solid #3b82f633; color: #3b82f6; }

    #legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #333; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

    #empty-state { text-align: center; padding: 50px 0; display: none; }
    #empty-state .icon  { font-size: 36px; margin-bottom: 10px; }
    #empty-state .label { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #333; }
    #footer { text-align: center; margin-top: 20px; color: #1f1f1f; font-size: 10px; font-family: 'JetBrains Mono', monospace; }

    .spin { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.5} }
    @keyframes spin  { from{transform:rotate(0deg)}to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div>
      <div id="title">⚡ LIVE SCOUT</div>
      <div id="subtitle">Bereit...</div>
    </div>
    <div id="header-right">
      <div id="alert-badge">0 ALERTS</div>
      <button id="notif-btn" onclick="toggleNotifications()">🔔 An</button>
      <button id="refresh-btn" onclick="fetchData()">↻ Refresh</button>
    </div>
  </div>
</div>

<div id="main">
  <div class="filter-row" id="filters-meta">
    <button class="filter-btn active" data-filter="ALL"    onclick="setFilter('ALL',this)">Alle (0)</button>
    <button class="filter-btn"        data-filter="ALERTS" onclick="setFilter('ALERTS',this)">🚨 Alerts (0)</button>
    <button class="filter-btn"        data-filter="VALUE"  onclick="setFilter('VALUE',this)">💰 Value ≥1.8</button>
  </div>
  <div class="section-header">Deine Szenarien</div>
  <div class="filter-row" id="filters-yours">
    <button class="filter-btn" data-filter="RED_CARD"        onclick="setFilter('RED_CARD',this)">🟥 Rote Karte</button>
    <button class="filter-btn" data-filter="FAVORITE_BEHIND" onclick="setFilter('FAVORITE_BEHIND',this)">📉 Favorit zurück</button>
    <button class="filter-btn" data-filter="PRESSURE"        onclick="setFilter('PRESSURE',this)">📊 Druckphase</button>
    <button class="filter-btn" data-filter="BOTH_OFFENSIVE"  onclick="setFilter('BOTH_OFFENSIVE',this)">⚽ Beide offensiv</button>
  </div>
  <div class="section-header">KI-Szenarien</div>
  <div class="filter-row" id="filters-ai">
    <button class="filter-btn" data-filter="LUCKY_GOAL"        onclick="setFilter('LUCKY_GOAL',this)">🍀 Glückstreffer</button>
    <button class="filter-btn" data-filter="LATE_GAME"         onclick="setFilter('LATE_GAME',this)">⏱ Schlussphase</button>
    <button class="filter-btn" data-filter="HALFTIME_VALUE"    onclick="setFilter('HALFTIME_VALUE',this)">⚖️ HT Value</button>
    <button class="filter-btn" data-filter="GOALLESS_PRESSURE" onclick="setFilter('GOALLESS_PRESSURE',this)">🔥 Torlos + Druck</button>
  </div>

  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>≥ 1.8 – Value</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>1.5–1.79 – ok</div>
    <div class="legend-item"><div class="legend-dot" style="background:#333"></div>&lt; 1.5 – niedrig</div>
  </div>

  <div id="status-box"></div>
  <div id="empty-state"><div class="icon">🌙</div><div class="label">Keine Live-Spiele gerade</div></div>
  <div id="match-list"></div>
  <div id="footer">Auto-Refresh · 60s · Max 15 Spiele · API-Football Pro</div>
</div>

<script>
const API_KEY  = "a12f449553100451bb491e6105db7c5f";
const API_BASE = "https://v3.football.api-sports.io";
const BOOKMAKER_ID = 8;

const SC = {
  RED_CARD:         { id:"RED_CARD",         group:"yours", label:"🟥 Rote Karte",     color:"#ef4444", bg:"#1a0505" },
  FAVORITE_BEHIND:  { id:"FAVORITE_BEHIND",  group:"yours", label:"📉 Favorit zurück", color:"#f59e0b", bg:"#1a1205" },
  PRESSURE:         { id:"PRESSURE",         group:"yours", label:"📊 Druckphase",      color:"#3b82f6", bg:"#05101a" },
  BOTH_OFFENSIVE:   { id:"BOTH_OFFENSIVE",   group:"yours", label:"⚽ Beide offensiv",  color:"#10b981", bg:"#051a10" },
  LUCKY_GOAL:       { id:"LUCKY_GOAL",       group:"ai",    label:"🍀 Glückstreffer",   color:"#a855f7", bg:"#120520" },
  LATE_GAME:        { id:"LATE_GAME",        group:"ai",    label:"⏱ Schlussphase",    color:"#ec4899", bg:"#1a0510" },
  HALFTIME_VALUE:   { id:"HALFTIME_VALUE",   group:"ai",    label:"⚖️ HT Value",        color:"#06b6d4", bg:"#051518" },
  GOALLESS_PRESSURE:{ id:"GOALLESS_PRESSURE",group:"ai",    label:"🔥 Torlos + Druck",  color:"#f97316", bg:"#1a0a00" },
};

const REC_REASONS = {
  RED_CARD:         (c) => `Team in Überzahl gewinnt nach roter Karte in ~71% der Fälle. Je früher die Karte (hier: ${c.minute||"?"}'), desto größer der Vorteil.`,
  FAVORITE_BEHIND_STRONG: (c) => `${c.favorName} dominiert klar (${c.poss}% Ballbesitz, ${c.shots} Schüsse aufs Tor) – der Score spiegelt das Spiel nicht wider. Starkes Signal.`,
  FAVORITE_BEHIND_WEAK:   (c) => `${c.favorName} hat mehr Ballbesitz (${c.poss}%) und erzeugt Druck (${c.shots} Schüsse / ${c.corners} Ecken) – Comeback möglich, aber kein sicheres Signal.`,
  PRESSURE:         (c) => `Anhaltender Druck: ${c.corners} Ecken, ${c.shots} Schüsse aufs Tor. Teams in solcher Druckphase erzielen in >60% der Fälle das nächste Tor.`,
  BOTH_OFFENSIVE:   (c) => `Beide Teams aktiv: ${c.shots1} / ${c.shots2} Schüsse aufs Tor. BTTS-Wahrscheinlichkeit liegt bei solchen Zahlen über 70%.`,
  LUCKY_GOAL:       (c) => `${c.leaderName} führt gegen die Spielkontrolle (est. xG: ${c.xgLow} vs ${c.xgHigh}). Markt korrigiert sich statistisch in solchen Situationen.`,
  LATE_GAME:        (c) => `${c.minute}' – Schlussphase mit aktivem Spiel. Späte Tore werden vom Markt systematisch unterbewertet.`,
  HALFTIME_VALUE:   (c) => `${c.favorName} dominiert zur Halbzeit (${c.poss}% / ${c.shots} Schüsse) ohne angemessenen Score. 2. Halbzeit-Wetten auf das dominante Team haben hohen EV.`,
  GOALLESS_PRESSURE:(c) => `${c.minute}' ohne Tor trotz ${c.shots} Schüssen und ${c.corners} Ecken. Druck muss sich entladen – Over 0.5 ist in >80% solcher Situationen erfolgreich.`,
};

let allMatches    = [];
let currentFilter = "ALL";
const LIVE_STATUSES = ["1H","2H","ET","P","LIVE","HT"];
const standingsCache = {};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
async function apiFetch(path) {
  const r = await fetch(API_BASE + path, { headers:{"x-apisports-key":API_KEY} });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
function safeGet(o,...keys){ return keys.reduce((x,k)=>(x!=null?x[k]:undefined),o); }
function getStat(arr,type){
  const s=(arr||[]).find(s=>s.type===type);
  const v=s?.value;
  if(v==null||v==="") return 0;
  return parseInt(String(v).replace("%",""))||0;
}

// ─── ODDS ────────────────────────────────────────────────────────────────────
const ODDS_MAP = {
  RED_CARD:         ["Match Winner","Double Chance"],
  FAVORITE_BEHIND:  ["Match Winner","Double Chance"],
  PRESSURE:         ["Match Winner"],
  BOTH_OFFENSIVE:   ["Goals Over/Under","Both Teams Score"],
  LUCKY_GOAL:       ["Double Chance","Both Teams Score","Goals Over/Under"],
  LATE_GAME:        ["Goals Over/Under","Both Teams Score"],
  HALFTIME_VALUE:   ["Second Half Winner","Match Winner"],
  GOALLESS_PRESSURE:["Goals Over/Under","Both Teams Score"],
  FREE:             ["Match Winner","Double Chance","Goals Over/Under","Both Teams Score"],
};

function extractOdds(bookmakers, scenarioId, ctx) {
  if(!bookmakers||!bookmakers.length) return [];
  let bm=bookmakers.find(b=>b.id===BOOKMAKER_ID)||bookmakers[0];
  if(!bm) return [];
  const bets=bm.bets||[];
  const targets=ODDS_MAP[scenarioId]||[];
  const results=[];

  for(const betName of targets){
    const bet=bets.find(b=>b.name===betName);
    if(!bet) continue;
    const vals=bet.values||[];

    if(betName==="Match Winner"){
      if(ctx.favorTeam==="home"){
        const v=vals.find(v=>v.value==="Home");
        if(v) results.push({label:`${ctx.homeName} Sieg`,odd:parseFloat(v.odd)});
      } else if(ctx.favorTeam==="away"){
        const v=vals.find(v=>v.value==="Away");
        if(v) results.push({label:`${ctx.awayName} Sieg`,odd:parseFloat(v.odd)});
      } else {
        const h=vals.find(v=>v.value==="Home");
        const a=vals.find(v=>v.value==="Away");
        const d=vals.find(v=>v.value==="Draw");
        if(h) results.push({label:`${ctx.homeName} Sieg`,odd:parseFloat(h.odd)});
        if(d) results.push({label:`Unentschieden`,odd:parseFloat(d.odd)});
        if(a) results.push({label:`${ctx.awayName} Sieg`,odd:parseFloat(a.odd)});
      }
    }
    if(betName==="Double Chance"){
      if(ctx.favorTeam==="home"){
        const v=vals.find(v=>v.value==="Home/Draw");
        if(v) results.push({label:"DC Heim/X",odd:parseFloat(v.odd)});
      } else if(ctx.favorTeam==="away"){
        const v=vals.find(v=>v.value==="Draw/Away");
        if(v) results.push({label:"DC X/Gast",odd:parseFloat(v.odd)});
      } else {
        const hd=vals.find(v=>v.value==="Home/Draw");
        const da=vals.find(v=>v.value==="Draw/Away");
        const ha=vals.find(v=>v.value==="Home/Away");
        if(hd) results.push({label:"DC Heim/X",odd:parseFloat(hd.odd)});
        if(da) results.push({label:"DC X/Gast",odd:parseFloat(da.odd)});
        if(ha) results.push({label:"DC Heim/Gast",odd:parseFloat(ha.odd)});
      }
    }
    if(betName==="Goals Over/Under"){
      const total=(ctx.homeGoals||0)+(ctx.awayGoals||0);
      const line=total+1.5;
      const hit=vals.find(v=>v.value===`Over ${line}`)||
                vals.find(v=>v.value&&v.value.startsWith("Over")&&parseFloat(v.value.replace("Over ",""))>=line);
      if(hit) results.push({label:hit.value,odd:parseFloat(hit.odd)});
    }
    if(betName==="Both Teams Score"){
      const v=vals.find(v=>v.value==="Yes");
      if(v) results.push({label:"BTTS – Ja",odd:parseFloat(v.odd)});
    }
    if(betName==="Second Half Winner"){
      const key=ctx.favorTeam==="home"?"Home":"Away";
      const v=vals.find(v=>v.value===key);
      if(v) results.push({label:`2H ${ctx.favorTeam==="home"?ctx.homeName:ctx.awayName}`,odd:parseFloat(v.odd)});
    }
  }

  const seen=new Set();
  return results.filter(r=>{
    if(!r.odd||isNaN(r.odd)||r.odd<=1.0) return false;
    if(seen.has(r.label)) return false;
    seen.add(r.label);
    return true;
  }).sort((a,b)=>b.odd-a.odd);
}

function oddsClass(odd){ return odd>=1.8?"good":odd>=1.5?"ok":"low"; }
function oddsVerdict(odd){
  if(odd>=1.8) return {cls:"good",text:"✓ Guter Value"};
  if(odd>=1.5) return {cls:"ok",  text:"~ Akzeptabel"};
  return             {cls:"low", text:"↓ Zu niedrig"};
}
function bestOdd(arr){ return arr&&arr.length?arr.reduce((b,o)=>o.odd>b.odd?o:b,arr[0]):null; }

function renderOddsChips(arr){
  if(!arr||!arr.length) return `<span class="odds-chip none">Keine Quoten</span>`;
  return arr.map(o=>`<span class="odds-chip ${oddsClass(o.odd)}">${o.odd.toFixed(2)} <span class="chip-label">${o.label}</span></span>`).join("");
}

// ─── FREE RECOMMENDATION ENGINE ──────────────────────────────────────────────
function buildFreeRec(fix, stats, allOdds) {
  const homeName  = safeGet(fix,"teams","home","name")||"Heim";
  const awayName  = safeGet(fix,"teams","away","name")||"Gast";
  const homeId    = safeGet(fix,"teams","home","id");
  const homeGoals = safeGet(fix,"goals","home")??0;
  const awayGoals = safeGet(fix,"goals","away")??0;
  const minute    = safeGet(fix,"fixture","status","elapsed")??0;
  const short     = safeGet(fix,"fixture","status","short")||"";
  const isHT      = short==="HT";

  const homeStats     = safeGet(stats,0,"statistics")||[];
  const awayStats     = safeGet(stats,1,"statistics")||[];
  const homeShotsOn   = getStat(homeStats,"Shots on Goal");
  const awayShotsOn   = getStat(awayStats,"Shots on Goal");
  const homeShotsTotal= getStat(homeStats,"Total Shots");
  const awayShotsTotal= getStat(awayStats,"Total Shots");
  const homePoss      = getStat(homeStats,"Ball Possession");
  const awayPoss      = getStat(awayStats,"Ball Possession");
  const homeCorners   = getStat(homeStats,"Corner Kicks");
  const awayCorners   = getStat(awayStats,"Corner Kicks");
  const homeDangerous = getStat(homeStats,"Dangerous Attacks");
  const awayDangerous = getStat(awayStats,"Dangerous Attacks");
  const homeXG        = +(homeShotsOn*0.33).toFixed(1);
  const awayXG        = +(awayShotsOn*0.33).toFixed(1);
  const totalGoals    = homeGoals+awayGoals;
  const minutesLeft   = isHT ? 45 : Math.max(0,90-minute);

  // Score all possible bet angles, pick the best
  const candidates = [];

  const statsAvail = homePoss>0||homeShotsOn>0||awayShotsOn>0;

  // 1. Dominant team losing/drawing
  // Use shots+corners as fallback when possession unavailable
  const homeDomScore = homePoss>0
    ? (homePoss/100)*0.4 + (homeShotsOn/10)*0.3 + (homeCorners/10)*0.15 + (homeDangerous/50)*0.15
    : (homeShotsTotal/10)*0.4 + (homeCorners/10)*0.35 + (homeShotsOn/10)*0.25;
  const awayDomScore = awayPoss>0
    ? (awayPoss/100)*0.4 + (awayShotsOn/10)*0.3 + (awayCorners/10)*0.15 + (awayDangerous/50)*0.15
    : (awayShotsTotal/10)*0.4 + (awayCorners/10)*0.35 + (awayShotsOn/10)*0.25;

  if(homeDomScore > awayDomScore+0.08 && homeGoals <= awayGoals && minute>=15){
    const strength = homeDomScore-awayDomScore;
    const statsNote = homePoss===0 ? `${homeShotsTotal} Schüsse, ${homeCorners} Ecken` : `Ballbesitz ${homePoss}%, ${homeShotsTotal} Schüsse, ${homeCorners} Ecken, ${homeDangerous} Gefahrenangriffe`;
    candidates.push({
      favorTeam:"home", bet:`${homeName} Sieg oder DC Heim/X`,
      reason:`${homeName} dominiert das Spiel (${statsNote}) steht aber nur ${homeGoals}:${awayGoals}.${homePoss===0?" (Ballbesitzdaten nicht verfügbar)":""}`,
      confidence: strength>0.15 ? "HOCH" : "MITTEL",
      score: strength * (minutesLeft>20?1.2:0.8)
    });
  }
  if(awayDomScore > homeDomScore+0.08 && awayGoals <= homeGoals && minute>=15){
    const strength = awayDomScore-homeDomScore;
    const statsNote = awayPoss===0 ? `${awayShotsTotal} Schüsse, ${awayCorners} Ecken` : `Ballbesitz ${awayPoss}%, ${awayShotsTotal} Schüsse, ${awayCorners} Ecken, ${awayDangerous} Gefahrenangriffe`;
    candidates.push({
      favorTeam:"away", bet:`${awayName} Sieg oder DC X/Gast`,
      reason:`${awayName} dominiert (${statsNote}) steht aber nur ${awayGoals}:${homeGoals}.${awayPoss===0?" (Ballbesitzdaten nicht verfügbar)":""}`,
      confidence: strength>0.15 ? "HOCH" : "MITTEL",
      score: strength * (minutesLeft>20?1.2:0.8)
    });
  }

  // 2. Over goals – open attacking game
  if(homeShotsOn>=2 && awayShotsOn>=2 && minute>=20 && minutesLeft>=20){
    const attackScore = (homeShotsOn+awayShotsOn)/10 + (homeCorners+awayCorners)/20;
    candidates.push({
      favorTeam:null, bet:`Over ${totalGoals+0.5} Tore oder BTTS – Ja`,
      reason:`Beide Teams offensiv aktiv (${homeShotsOn}+${awayShotsOn} Schüsse aufs Tor, ${homeCorners+awayCorners} Ecken gesamt). Offenes Spiel mit hoher Torwahrscheinlichkeit.`,
      confidence: attackScore>0.6?"HOCH":"MITTEL",
      score: attackScore * (minutesLeft>25?1.1:0.7)
    });
  }

  // 3. Late game – close score with pressure
  if(minute>=70 && Math.abs(homeGoals-awayGoals)<=1 && (homeShotsOn+awayShotsOn)>=4){
    const loser=homeGoals<awayGoals?homeName:awayGoals<homeGoals?awayName:null;
    candidates.push({
      favorTeam: loser===homeName?"home":loser===awayName?"away":null,
      bet: loser?`${loser} Ausgleich · Over ${totalGoals+0.5}`:`Over ${totalGoals+0.5} Tore`,
      reason:`${minute}' – knappes Spiel mit ${homeShotsOn+awayShotsOn} Schüssen aufs Tor. Schlussphase erzeugt offene Situationen; Markt unterschätzt späte Tore systematisch.`,
      confidence:"MITTEL",
      score:0.5*(minutesLeft<15?1.3:1.0)
    });
  }

  // 4. xG mismatch – lucky scoreline
  if(minute>=25 && homeGoals!==awayGoals){
    const leader=homeGoals>awayGoals?"home":"away";
    const leaderXG=leader==="home"?homeXG:awayXG;
    const trailerXG=leader==="home"?awayXG:homeXG;
    if(trailerXG>leaderXG+0.65 && trailerXG>=0.7){
      const trailerName=leader==="home"?awayName:homeName;
      const favorTeam=leader==="home"?"away":"home";
      candidates.push({
        favorTeam,
        bet:`DC ${favorTeam==="home"?"Heim/X":"X/Gast"} oder BTTS – Ja`,
        reason:`Scoreline spiegelt das Spiel nicht wider – ${trailerName} hat deutlich mehr Chancen (est. xG ${trailerXG} vs ${leaderXG}). Ausgleich statistisch wahrscheinlich.`,
        confidence:"MITTEL",
        score:0.45*(minutesLeft>20?1.1:0.8)
      });
    }
  }

  // 5. 0:0 with clear pressure – first goal likely
  if(homeGoals===0&&awayGoals===0&&minute>=20){
    const totalPressure=(homeShotsOn+awayShotsOn)+(homeCorners+awayCorners)*0.5+(homeDangerous+awayDangerous)*0.02;
    if(totalPressure>=5){
      candidates.push({
        favorTeam:null, bet:`Over 0.5 Tore (erstes Tor) · BTTS`,
        reason:`0:0 bei ${minute}' trotz hohem Druck (${homeShotsOn+awayShotsOn} Schüsse, ${homeCorners+awayCorners} Ecken). Erstes Tor ist sehr wahrscheinlich.`,
        confidence:totalPressure>8?"HOCH":"MITTEL",
        score:(totalPressure/10)*(minutesLeft>30?1.2:0.9)
      });
    }
  }

  if(candidates.length===0) return null;

  // Pick highest score
  const best = candidates.sort((a,b)=>b.score-a.score)[0];

  // Get relevant odds
  const oddsCtx={homeName,awayName,homeGoals,awayGoals,favorTeam:best.favorTeam};
  const oddsData=extractOdds(allOdds,best.favorTeam?
    (best.bet.includes("Over")||best.bet.includes("BTTS")?"BOTH_OFFENSIVE":"FAVORITE_BEHIND")
    :"BOTH_OFFENSIVE", oddsCtx);

  return { ...best, oddsData };
}

// ─── ANALYSIS ────────────────────────────────────────────────────────────────
function analyzeFixture(fix, events, stats) {
  const triggers=[];
  const homeId    =safeGet(fix,"teams","home","id");
  const homeName  =safeGet(fix,"teams","home","name")||"Heim";
  const awayName  =safeGet(fix,"teams","away","name")||"Gast";
  const homeGoals =safeGet(fix,"goals","home")??0;
  const awayGoals =safeGet(fix,"goals","away")??0;
  const minute    =safeGet(fix,"fixture","status","elapsed")??0;
  const short     =safeGet(fix,"fixture","status","short")||"";
  const isHT      =short==="HT";

  const homeStats     =safeGet(stats,0,"statistics")||[];
  const awayStats     =safeGet(stats,1,"statistics")||[];
  const homeShotsOn   =getStat(homeStats,"Shots on Goal");
  const awayShotsOn   =getStat(awayStats,"Shots on Goal");
  const homeShotsTotal=getStat(homeStats,"Total Shots");
  const awayShotsTotal=getStat(awayStats,"Total Shots");
  const homePoss      =getStat(homeStats,"Ball Possession");
  const awayPoss      =getStat(awayStats,"Ball Possession");
  const homeCorners   =getStat(homeStats,"Corner Kicks");
  const awayCorners   =getStat(awayStats,"Corner Kicks");
  const homeDangerous =getStat(homeStats,"Dangerous Attacks");
  const awayDangerous =getStat(awayStats,"Dangerous Attacks");
  const homeXG        =+(homeShotsOn*0.33).toFixed(1);
  const awayXG        =+(awayShotsOn*0.33).toFixed(1);

  if(minute<5&&!isHT) return triggers;
  const ctx={homeName,awayName,homeGoals,awayGoals};

  // 1. ROTE KARTE
  const reds=(events||[]).filter(e=>e?.type==="Card"&&e?.detail==="Red Card");
  if(reds.length>0){
    const last=reds[reds.length-1];
    const redTeamId=safeGet(last,"team","id");
    const redName=safeGet(last,"team","name")||"?";
    const beneficiary=redTeamId===homeId?awayName:homeName;
    const favorTeam=redTeamId===homeId?"away":"home";
    const redMin=safeGet(last,"time","elapsed");
    triggers.push({scenario:SC.RED_CARD,signal:"strong",
      oddsCtx:{...ctx,favorTeam},
      recCtx:{minute:redMin,favorName:beneficiary},
      reasonKey:"RED_CARD",
      detail:`${redName} in Unterzahl seit ${redMin}' – ${beneficiary} in Überzahl`,
      recBet:favorTeam==="home"?`${homeName} Sieg oder DC Heim/X`:`${awayName} Sieg oder DC X/Gast`
    });
  }

  // 2. FAVORIT ZURÜCK – STRONG (Stufe 1)
  // Also trigger when possession data is missing but shots+corners suggest dominance
  const statsAvailable = homePoss > 0 || awayShotsOn > 0 || homeShotsOn > 0;
  const homeStrongBehind = homeGoals<awayGoals && minute>=15 && (
    (homePoss>58 && homeShotsOn>=2) ||
    (!statsAvailable && homeShotsTotal>=3 && homeCorners>=2)
  );
  const awayStrongBehind = awayGoals<homeGoals && minute>=15 && (
    (awayPoss>58 && awayShotsOn>=2) ||
    (!statsAvailable && awayShotsTotal>=3 && awayCorners>=2)
  );
  // WEAK (Stufe 2)
  const homeWeakBehind = !homeStrongBehind&&homeGoals<awayGoals&&minute>=20&&(
    (homePoss>62&&(homeShotsTotal>=4||homeCorners>=3)) ||
    (homePoss===0&&homeShotsTotal>=3&&homeCorners>=2)
  );
  const awayWeakBehind = !awayStrongBehind&&awayGoals<homeGoals&&minute>=20&&(
    (awayPoss>62&&(awayShotsTotal>=4||awayCorners>=3)) ||
    (awayPoss===0&&awayShotsTotal>=3&&awayCorners>=2)
  );

  if(homeStrongBehind){
    triggers.push({scenario:SC.FAVORITE_BEHIND,signal:"strong",
      oddsCtx:{...ctx,favorTeam:"home"},
      recCtx:{favorName:homeName,poss:homePoss,shots:homeShotsOn},
      reasonKey:"FAVORITE_BEHIND_STRONG",
      detail:`${homeName}: ${homePoss}% Ballbesitz · ${homeShotsOn} Schüsse aufs Tor · zurück ${homeGoals}:${awayGoals}`,
      recBet:`${homeName} Sieg oder DC Heim/X`
    });
  } else if(homeWeakBehind){
    triggers.push({scenario:SC.FAVORITE_BEHIND,signal:"weak",
      oddsCtx:{...ctx,favorTeam:"home"},
      recCtx:{favorName:homeName,poss:homePoss,shots:homeShotsTotal,corners:homeCorners},
      reasonKey:"FAVORITE_BEHIND_WEAK",
      detail:`${homeName}: ${homePoss}% Ballbesitz · ${homeShotsTotal} Schüsse · ${homeCorners} Ecken · zurück ${homeGoals}:${awayGoals}`,
      recBet:`DC Heim/X – mit Vorsicht`
    });
  }
  if(awayStrongBehind){
    triggers.push({scenario:SC.FAVORITE_BEHIND,signal:"strong",
      oddsCtx:{...ctx,favorTeam:"away"},
      recCtx:{favorName:awayName,poss:awayPoss,shots:awayShotsOn},
      reasonKey:"FAVORITE_BEHIND_STRONG",
      detail:`${awayName}: ${awayPoss}% Ballbesitz · ${awayShotsOn} Schüsse aufs Tor · zurück ${awayGoals}:${homeGoals}`,
      recBet:`${awayName} Sieg oder DC X/Gast`
    });
  } else if(awayWeakBehind){
    triggers.push({scenario:SC.FAVORITE_BEHIND,signal:"weak",
      oddsCtx:{...ctx,favorTeam:"away"},
      recCtx:{favorName:awayName,poss:awayPoss,shots:awayShotsTotal,corners:awayCorners},
      reasonKey:"FAVORITE_BEHIND_WEAK",
      detail:`${awayName}: ${awayPoss}% Ballbesitz · ${awayShotsTotal} Schüsse · ${awayCorners} Ecken · zurück ${awayGoals}:${homeGoals}`,
      recBet:`DC X/Gast – mit Vorsicht`
    });
  }

  // 3. DRUCKPHASE
  if(homePoss>60&&homeCorners>=3&&homeShotsOn>=3&&minute>=20){
    triggers.push({scenario:SC.PRESSURE,signal:"strong",
      oddsCtx:{...ctx,favorTeam:"home"},
      recCtx:{favorName:homeName,poss:homePoss,shots:homeShotsOn,corners:homeCorners},
      reasonKey:"PRESSURE",
      detail:`${homeName}: ${homePoss}% · ${homeCorners} Ecken · ${homeShotsOn} Schüsse aufs Tor`,
      recBet:`${homeName} Sieg · Nächstes Tor ${homeName}`
    });
  } else if(awayPoss>60&&awayCorners>=3&&awayShotsOn>=3&&minute>=20){
    triggers.push({scenario:SC.PRESSURE,signal:"strong",
      oddsCtx:{...ctx,favorTeam:"away"},
      recCtx:{favorName:awayName,poss:awayPoss,shots:awayShotsOn,corners:awayCorners},
      reasonKey:"PRESSURE",
      detail:`${awayName}: ${awayPoss}% · ${awayCorners} Ecken · ${awayShotsOn} Schüsse aufs Tor`,
      recBet:`${awayName} Sieg · Nächstes Tor ${awayName}`
    });
  }

  // 4. BEIDE OFFENSIV
  if(homeShotsOn>=3&&awayShotsOn>=3&&minute>=20){
    triggers.push({scenario:SC.BOTH_OFFENSIVE,signal:"strong",
      oddsCtx:{...ctx,favorTeam:null},
      recCtx:{shots1:homeShotsOn,shots2:awayShotsOn},
      reasonKey:"BOTH_OFFENSIVE",
      detail:`${homeName}: ${homeShotsOn} / ${awayName}: ${awayShotsOn} Schüsse aufs Tor`,
      recBet:`Over ${homeGoals+awayGoals+0.5} Tore · BTTS – Ja`
    });
  }

  // 5. GLÜCKSTREFFER
  if(minute>=20){
    if(homeGoals>awayGoals&&awayXG>homeXG+0.6&&awayXG>=0.7){
      triggers.push({scenario:SC.LUCKY_GOAL,signal:"strong",
        oddsCtx:{...ctx,favorTeam:"away"},
        recCtx:{leaderName:homeName,favorName:awayName,xgLow:homeXG,xgHigh:awayXG},
        reasonKey:"LUCKY_GOAL",
        detail:`${homeName} führt ${homeGoals}:${awayGoals} – xG Heim ${homeXG} / Gast ${awayXG}`,
        recBet:`DC X/Gast oder BTTS – Ja`
      });
    } else if(awayGoals>homeGoals&&homeXG>awayXG+0.6&&homeXG>=0.7){
      triggers.push({scenario:SC.LUCKY_GOAL,signal:"strong",
        oddsCtx:{...ctx,favorTeam:"home"},
        recCtx:{leaderName:awayName,favorName:homeName,xgLow:awayXG,xgHigh:homeXG},
        reasonKey:"LUCKY_GOAL",
        detail:`${awayName} führt ${awayGoals}:${homeGoals} – xG Heim ${homeXG} / Gast ${awayXG}`,
        recBet:`DC Heim/X oder BTTS – Ja`
      });
    }
  }

  // 6. SCHLUSSPHASE
  if(minute>=75){
    const totalShots=homeShotsOn+awayShotsOn;
    const scoreDiff=Math.abs(homeGoals-awayGoals);
    if(totalShots>=5&&scoreDiff<=1){
      const loser=homeGoals<awayGoals?homeName:awayGoals<homeGoals?awayName:null;
      const favorTeam=loser===homeName?"home":loser===awayName?"away":null;
      triggers.push({scenario:SC.LATE_GAME,signal:"strong",
        oddsCtx:{...ctx,favorTeam},
        recCtx:{minute,shots:totalShots},
        reasonKey:"LATE_GAME",
        detail:`${minute}' · ${homeGoals}:${awayGoals} · ${totalShots} Schüsse aufs Tor`,
        recBet:loser?`${loser} Ausgleich · Over ${homeGoals+awayGoals+0.5}`:`Over ${homeGoals+awayGoals+0.5} · BTTS`
      });
    }
  }

  // 7. HALBZEIT VALUE
  if(isHT||(minute>=42&&minute<=48)){
    if(homePoss>60&&homeShotsTotal>=4&&homeGoals<=awayGoals){
      triggers.push({scenario:SC.HALFTIME_VALUE,signal:"strong",
        oddsCtx:{...ctx,favorTeam:"home"},
        recCtx:{favorName:homeName,poss:homePoss,shots:homeShotsTotal},
        reasonKey:"HALFTIME_VALUE",
        detail:`HT: ${homeName} dominiert (${homePoss}% · ${homeShotsTotal} Schüsse) – Score: ${homeGoals}:${awayGoals}`,
        recBet:`${homeName} gewinnt 2. Halbzeit`
      });
    } else if(awayPoss>60&&awayShotsTotal>=4&&awayGoals<=homeGoals){
      triggers.push({scenario:SC.HALFTIME_VALUE,signal:"strong",
        oddsCtx:{...ctx,favorTeam:"away"},
        recCtx:{favorName:awayName,poss:awayPoss,shots:awayShotsTotal},
        reasonKey:"HALFTIME_VALUE",
        detail:`HT: ${awayName} dominiert (${awayPoss}% · ${awayShotsTotal} Schüsse) – Score: ${awayGoals}:${homeGoals}`,
        recBet:`${awayName} gewinnt 2. Halbzeit`
      });
    }
  }

  // 8. TORLOS + DRUCK
  if(homeGoals===0&&awayGoals===0&&minute>=15){
    const totalShotsOn=homeShotsOn+awayShotsOn;
    const totalCorners=homeCorners+awayCorners;
    const totalDangerous=homeDangerous+awayDangerous;
    if(totalShotsOn>=4||(totalCorners>=5&&minute>=30)||totalDangerous>=25){
      triggers.push({scenario:SC.GOALLESS_PRESSURE,signal:"strong",
        oddsCtx:{...ctx,favorTeam:null},
        recCtx:{minute,shots:totalShotsOn,corners:totalCorners},
        reasonKey:"GOALLESS_PRESSURE",
        detail:`0:0 · ${minute}' · ${totalShotsOn} Schüsse · ${totalCorners} Ecken · ${totalDangerous} Gefahrenangriffe`,
        recBet:`Over 0.5 Tore · BTTS · Over 1.5`
      });
    }
  }

  return triggers;
}

// ─── STANDINGS ───────────────────────────────────────────────────────────────
async function fetchStandings(leagueId,season){
  const key=`${leagueId}_${season}`;
  if(standingsCache[key]) return standingsCache[key];
  try{
    const res=await apiFetch(`/standings?league=${leagueId}&season=${season}`);
    const data=safeGet(res,"response",0,"league","standings",0)||[];
    standingsCache[key]=data;
    return data;
  }catch{return[];}
}

function renderStandingsTable(standings,homeId,awayId){
  if(!standings||!standings.length) return `<div class="standings-loading">Keine Tabellendaten</div>`;
  return `<table class="standings-table">
    <thead><tr><th>Team</th><th>Sp</th><th>S</th><th>U</th><th>N</th><th>Tore</th><th>Pkt</th></tr></thead>
    <tbody>${standings.map((row,i)=>{
      const hi=row.team?.id===homeId||row.team?.id===awayId;
      const gf=safeGet(row,"all","goals","for")??"-";
      const ga=safeGet(row,"all","goals","against")??"-";
      return `<tr class="${hi?"highlighted":""}">
        <td><span class="pos-num">${row.rank||i+1}</span><span class="team-name-cell">${row.team?.name||"?"}</span></td>
        <td>${safeGet(row,"all","played")??0}</td>
        <td>${safeGet(row,"all","win")??0}</td>
        <td>${safeGet(row,"all","draw")??0}</td>
        <td>${safeGet(row,"all","lose")??0}</td>
        <td><span class="gf">${gf}</span>:<span class="ga">${ga}</span></td>
        <td class="pts-cell">${row.points??"-"}</td>
      </tr>`;
    }).join("")}</tbody>
  </table>`;
}

// ─── UI ──────────────────────────────────────────────────────────────────────
function matchHasValue(m){ return m.triggers.some(t=>t.oddsData&&t.oddsData.some(o=>o.odd>=1.8))||(m.freeRec&&m.freeRec.oddsData&&m.freeRec.oddsData.some(o=>o.odd>=1.8)); }

function setStatus(msg,type){
  const el=document.getElementById("status-box");
  if(!msg){el.style.display="none";return;}
  el.className=type||"info";
  el.textContent=(type==="error"?"⚠ ":"ℹ ")+msg;
  el.style.display="block";
}

function updateHeader(total){
  const now=new Date().toLocaleTimeString("de-DE");
  const shown = allMatches.length;
  const suffix = total > shown ? ` (${total} gesamt, ${total-shown} ohne Stats)` : "";
  document.getElementById("subtitle").textContent=`${now} · ${shown} Spiele mit Daten${suffix}`;
  const ac=allMatches.filter(m=>m.triggers.length>0||m.freeRec).length;
  const badge=document.getElementById("alert-badge");
  badge.style.display=ac>0?"block":"none";
  badge.textContent=`${ac} ALERT${ac!==1?"S":""}`;
}

function setFilter(filter,btn){
  currentFilter=filter;
  document.querySelectorAll(".filter-btn").forEach(b=>{
    b.classList.remove("active","col-red","col-amber","col-blue","col-green","col-lime","col-purple","col-pink","col-cyan","col-orange");
  });
  btn.classList.add("active");
  const map={RED_CARD:"col-red",FAVORITE_BEHIND:"col-amber",PRESSURE:"col-blue",BOTH_OFFENSIVE:"col-green",
    ALERTS:"col-lime",VALUE:"col-lime",LUCKY_GOAL:"col-purple",LATE_GAME:"col-pink",HALFTIME_VALUE:"col-cyan",GOALLESS_PRESSURE:"col-orange"};
  if(map[filter]) btn.classList.add(map[filter]);
  renderMatches();
}

function toggleStandings(fixId){
  const wrap=document.getElementById(`st-${fixId}`);
  const btn=document.getElementById(`st-btn-${fixId}`);
  if(!wrap) return;
  const wasOpen=wrap.classList.contains("open");
  wrap.classList.toggle("open");
  btn.textContent=wasOpen?"📊 Tabelle":"✕ Schließen";
  if(!wasOpen&&wrap.dataset.loaded!=="true"){
    wrap.dataset.loaded="true";
    const lid=parseInt(wrap.dataset.lid),season=parseInt(wrap.dataset.season);
    const hid=parseInt(wrap.dataset.hid),aid=parseInt(wrap.dataset.aid);
    wrap.querySelector(".standings-loading").textContent="Wird geladen...";
    fetchStandings(lid,season).then(s=>{
      const el=wrap.querySelector(".standings-loading");
      if(el) el.outerHTML=renderStandingsTable(s,hid,aid);
    });
  }
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderMatches(){
  const list=document.getElementById("match-list");
  let filtered=allMatches.filter(m=>{
    if(currentFilter==="ALL")    return true;
    if(currentFilter==="ALERTS") return m.triggers.length>0||m.freeRec;
    if(currentFilter==="VALUE")  return matchHasValue(m);
    return m.triggers.some(t=>t.scenario.id===currentFilter);
  });
  filtered.sort((a,b)=>b.triggers.length-a.triggers.length);

  if(filtered.length===0){
    list.innerHTML="";
    document.getElementById("empty-state").style.display="block";
    document.getElementById("empty-state").querySelector(".label").textContent=
      allMatches.length>0?"Kein Spiel erfüllt dieses Kriterium":"Keine Live-Spiele gerade";
    return;
  }
  document.getElementById("empty-state").style.display="none";

  list.innerHTML=filtered.map(m=>{
    const minute  =safeGet(m,"fixture","status","elapsed");
    const short   =safeGet(m,"fixture","status","short")||"";
    const isLive  =["1H","2H","ET","P","LIVE"].includes(short);
    const minLabel=minute?`${minute}'`:short;
    const hGoals  =safeGet(m,"goals","home")??0;
    const aGoals  =safeGet(m,"goals","away")??0;
    const country =safeGet(m,"league","country")||"";
    const league  =safeGet(m,"league","name")||"";
    const logo    =safeGet(m,"league","logo")||"";
    const homeName=safeGet(m,"teams","home","name")||"?";
    const awayName=safeGet(m,"teams","away","name")||"?";
    const homeId  =safeGet(m,"teams","home","id");
    const awayId  =safeGet(m,"teams","away","id");
    const leagueId=safeGet(m,"league","id");
    const season  =safeGet(m,"league","season");
    const fixId   =safeGet(m,"fixture","id");

    // Free recommendation box
    let freeRecHtml="";
    if(m.freeRec){
      const fr=m.freeRec;
      const confCls=fr.confidence==="HOCH"?"conf-high":fr.confidence==="MITTEL"?"conf-medium":"conf-low";
      const bestO=bestOdd(fr.oddsData);
      const verdict=bestO?oddsVerdict(bestO.odd):null;
      freeRecHtml=`<div class="free-rec">
        <div class="free-rec-header">
          <span class="free-rec-label">KI BESTE WETTE</span>
          <span class="free-rec-confidence ${confCls}">Konfidenz: ${fr.confidence}</span>
        </div>
        <div class="free-rec-bet" style="color:#f0f0f0">${fr.bet}</div>
        <div class="free-rec-reason">${fr.reason}</div>
        <div class="free-rec-odds">
          ${renderOddsChips(fr.oddsData)}
          ${verdict?`<span class="odds-verdict ${verdict.cls}">${verdict.text}</span>`:""}
        </div>
      </div>`;
    }

    // Scenario triggers
    const triggersHtml=m.triggers.length>0?`
      <div class="triggers">
        ${m.triggers.map(t=>{
          const reasonFn=REC_REASONS[t.reasonKey]||REC_REASONS[t.scenario.id];
          const reason=reasonFn?reasonFn(t.recCtx||{}):"";
          const best=bestOdd(t.oddsData);
          const verdict=best?oddsVerdict(best.odd):null;
          const signalBadge=t.signal==="weak"
            ?`<span class="signal-badge signal-weak">⚠ Schwaches Signal</span>`
            :`<span class="signal-badge signal-strong">✓ Starkes Signal</span>`;
          return `<div class="trigger-item">
            <div class="trigger-header">
              <span class="trigger-badge" style="background:${t.scenario.bg};color:${t.scenario.color};border:1px solid ${t.scenario.color}33">${t.scenario.label}</span>
              ${signalBadge}
              <span class="trigger-source">${t.scenario.group==="ai"?"KI":"Dein Szenario"}</span>
            </div>
            <div class="trigger-detail">${t.detail}</div>
            <div class="rec-box" style="background:${t.scenario.bg}88;border-color:${t.scenario.color}22">
              <div class="rec-title" style="color:${t.scenario.color}">💡 EMPFEHLUNG</div>
              <div class="rec-bet" style="color:${t.scenario.color}">${t.recBet}</div>
              <div class="rec-reason">${reason}</div>
              <div class="rec-odds">
                ${renderOddsChips(t.oddsData)}
                ${verdict?`<span class="odds-verdict ${verdict.cls}">${verdict.text}</span>`:""}
              </div>
            </div>
          </div>`;
        }).join("")}
      </div>`:"";

    // Observation bar – shown from minute 5 when no triggers yet
    let obsHtml = "";
    if(minute >= 5) {
      const hStats = safeGet(m,"_stats",0,"statistics")||[];
      const aStats = safeGet(m,"_stats",1,"statistics")||[];
      const hPoss  = getStat(hStats,"Ball Possession");
      const aPoss  = getStat(aStats,"Ball Possession");
      const hShots = getStat(hStats,"Total Shots");
      const aShots = getStat(aStats,"Total Shots");
      const hShotsOn = getStat(hStats,"Shots on Goal");
      const aShotsOn = getStat(aStats,"Shots on Goal");
      const hCorners = getStat(hStats,"Corner Kicks");
      const aCorners = getStat(aStats,"Corner Kicks");
      const hasAnyStats = hPoss>0||hShots>0||aShots>0||hCorners>0;

      const statsHtml = hasAnyStats
        ? `<div class="obs-stats">
            ${hPoss>0?`<span class="obs-stat">Ball: <span>${hPoss}%–${aPoss}%</span></span>`:""}
            <span class="obs-stat">Schüsse: <span>${hShots}–${aShots}</span></span>
            <span class="obs-stat">Aufs Tor: <span>${hShotsOn}–${aShotsOn}</span></span>
            <span class="obs-stat">Ecken: <span>${hCorners}–${aCorners}</span></span>
          </div>`
        : `<span class="obs-nostats">Statistiken noch nicht verfügbar</span>`;

      obsHtml = `<div class="obs-bar">
        <div class="obs-dot"></div>
        <span class="obs-label">BEOBACHTUNG LÄUFT</span>
        ${statsHtml}
      </div>`;
    }

    return `<div class="match-card ${(m.triggers.length>0||m.freeRec)?"has-alert":""}">
      <div class="match-main">
        <div class="match-league">
          <span>${country.toUpperCase()} · ${league}</span>
          <span class="standings-toggle" id="st-btn-${fixId}" onclick="toggleStandings(${fixId})">📊 Tabelle</span>
        </div>
        <div class="match-row">
          <div class="match-teams">
            <div class="match-home">${homeName}</div>
            <div class="match-away">${awayName}</div>
          </div>
          <div class="match-score-wrap">
            <div class="match-score">${hGoals} : ${aGoals}</div>
            <div class="match-minute ${isLive?"live":""}">${minLabel}</div>
          </div>
          <div style="flex:1;text-align:right">${logo?`<img class="match-logo" src="${logo}" alt=""/>`:""}</div>
        </div>
        ${triggersHtml}
      </div>
      ${m.triggers.length===0 ? obsHtml : ""}
      ${freeRecHtml}
      <div class="standings-wrap" id="st-${fixId}" data-lid="${leagueId}" data-season="${season}" data-hid="${homeId}" data-aid="${awayId}">
        <div class="standings-title">TABELLE · ${league}</div>
        <div class="standings-loading">Klicke "Tabelle" um zu laden</div>
      </div>
    </div>`;
  }).join("");
}

// ─── NOTIFICATIONS ───────────────────────────────────────────────────────────
let notificationsEnabled = false;
let notifiedMatches = {}; // track which fixture+scenario already notified

function updateNotifBtn() {
  const btn = document.getElementById("notif-btn");
  if (!btn) return;
  if (Notification.permission === "denied") {
    btn.className = "off";
    btn.textContent = "🔕 Blockiert";
    return;
  }
  if (notificationsEnabled && Notification.permission === "granted") {
    btn.className = "on";
    btn.textContent = "🔔 Aktiv";
  } else {
    btn.className = "";
    btn.textContent = "🔔 An";
  }
}

async function toggleNotifications() {
  if (Notification.permission === "denied") {
    alert("Benachrichtigungen sind in deinem Browser blockiert.\nBitte in den Browser-Einstellungen erlauben.");
    return;
  }
  if (!notificationsEnabled) {
    const perm = await Notification.requestPermission();
    if (perm === "granted") {
      notificationsEnabled = true;
      // Test notification
      new Notification("⚡ Live Scout aktiv", {
        body: "Du wirst benachrichtigt sobald eine Wettchance erkannt wird.",
        icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"
      });
    }
  } else {
    notificationsEnabled = false;
  }
  updateNotifBtn();
}

function sendNotification(match, trigger) {
  if (!notificationsEnabled || Notification.permission !== "granted") return;

  const fixId    = safeGet(match, "fixture", "id");
  const notifKey = `${fixId}_${trigger.scenario.id}`;

  // Only notify once per fixture+scenario combo until it disappears
  if (notifiedMatches[notifKey]) return;
  notifiedMatches[notifKey] = true;

  const homeName = safeGet(match, "teams", "home", "name") || "?";
  const awayName = safeGet(match, "teams", "away", "name") || "?";
  const hGoals   = safeGet(match, "goals", "home") ?? 0;
  const aGoals   = safeGet(match, "goals", "away") ?? 0;
  const minute   = safeGet(match, "fixture", "status", "elapsed") || "?";
  const league   = safeGet(match, "league", "name") || "";

  const bestO    = bestOdd(trigger.oddsData);
  const oddsText = bestO ? ` · Quote ${bestO.odd.toFixed(2)}` : "";

  const title = `${trigger.scenario.label} – ${homeName} vs ${awayName}`;
  const body  = `${hGoals}:${aGoals} · ${minute}' · ${league}\n${trigger.recBet}${oddsText}`;

  const notif = new Notification(title, {
    body,
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>",
    tag: notifKey, // prevents duplicate system notifications
    requireInteraction: false
  });

  // Auto-close after 8 seconds
  setTimeout(() => notif.close(), 8000);
}

function sendFreeRecNotification(match) {
  if (!notificationsEnabled || Notification.permission !== "granted") return;
  if (!match.freeRec) return;

  const fixId    = safeGet(match, "fixture", "id");
  const notifKey = `${fixId}_FREE`;
  if (notifiedMatches[notifKey]) return;

  // Only notify for HIGH confidence free recs
  if (match.freeRec.confidence !== "HOCH") return;
  notifiedMatches[notifKey] = true;

  const homeName = safeGet(match, "teams", "home", "name") || "?";
  const awayName = safeGet(match, "teams", "away", "name") || "?";
  const hGoals   = safeGet(match, "goals", "home") ?? 0;
  const aGoals   = safeGet(match, "goals", "away") ?? 0;
  const minute   = safeGet(match, "fixture", "status", "elapsed") || "?";
  const bestO    = bestOdd(match.freeRec.oddsData);
  const oddsText = bestO ? ` · Quote ${bestO.odd.toFixed(2)}` : "";

  const notif = new Notification(`💡 KI Empfehlung – ${homeName} vs ${awayName}`, {
    body: `${hGoals}:${aGoals} · ${minute}'\n${match.freeRec.bet}${oddsText}`,
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>",
    tag: notifKey,
    requireInteraction: false
  });
  setTimeout(() => notif.close(), 8000);
}

// Clean up notified matches that are no longer live
function cleanupNotified() {
  const liveIds = new Set(allMatches.map(m => safeGet(m, "fixture", "id")));
  Object.keys(notifiedMatches).forEach(key => {
    const fixId = parseInt(key.split("_")[0]);
    if (!liveIds.has(fixId)) delete notifiedMatches[key];
  });
}

// ─── FETCH ───────────────────────────────────────────────────────────────────
async function fetchData(){
  const btn=document.getElementById("refresh-btn");
  btn.innerHTML='<span class="spin">⟳</span>';
  btn.disabled=true;
  setStatus(null);
  try{
    const fr=await apiFetch("/fixtures?live=all");
    if(fr.errors){const e=Object.values(fr.errors).filter(Boolean);if(e.length){setStatus(e.join(", "),"error");return;}}
    const raw=fr.response||[];
    const fixtures=raw.filter(f=>{const s=safeGet(f,"fixture","status","short");return s&&LIVE_STATUSES.includes(s);});
    if(fixtures.length===0){allMatches=[];renderMatches();updateHeader(0);return;}
    setStatus(`${fixtures.length} Spiele · Daten werden geladen...`,"info");
    const limited=fixtures.slice(0,15);
    const enriched=await Promise.all(limited.map(async fix=>{
      try{
        const id=safeGet(fix,"fixture","id");
        const [evRes,stRes,odRes]=await Promise.all([
          apiFetch(`/fixtures/events?fixture=${id}`),
          apiFetch(`/fixtures/statistics?fixture=${id}`),
          apiFetch(`/odds/live?fixture=${id}`),
        ]);
        const statsData=stRes.response||[];
        const triggers=analyzeFixture(fix,evRes.response||[],statsData);
        const bookmakers=safeGet(odRes,"response",0,"bookmakers")||[];
        triggers.forEach(t=>{t.oddsData=extractOdds(bookmakers,t.scenario.id,t.oddsCtx);});
        const freeRec=buildFreeRec(fix,statsData,bookmakers);
        return {...fix,triggers,freeRec,_stats:statsData};
      }catch{return {...fix,triggers:[],freeRec:null};}
    }));
    // Only keep matches where API returned at least some stats
    const withStats = enriched.filter(m => {
      const homeStats = safeGet(m,"_stats",0,"statistics")||[];
      const awayStats = safeGet(m,"_stats",1,"statistics")||[];
      const hasAny = [...homeStats,...awayStats].some(s => {
        const v = s?.value;
        return v !== null && v !== undefined && v !== "" && v !== "0" && v !== 0;
      });
      return hasAny;
    });

    allMatches = withStats;

    // Fire notifications for new triggers
    withStats.forEach(m => {
      m.triggers.forEach(t => sendNotification(m, t));
      sendFreeRecNotification(m);
    });
    cleanupNotified();

    renderMatches();
    updateHeader(fixtures.length);
    const filtered_out = enriched.length - withStats.length;
    setStatus(null);
    if (filtered_out > 0) {
      // Show briefly then hide
      setStatus(`${filtered_out} Spiel(e) ohne Live-Stats ausgeblendet · ${withStats.length} mit Daten`, "info");
      setTimeout(() => setStatus(null), 4000);
    }
  }catch(err){setStatus("Verbindungsfehler: "+err.message,"error");}
  finally{
    btn.innerHTML="↻ Refresh";
    btn.disabled=false;
    document.querySelector('[data-filter="ALL"]').textContent=`Alle (${allMatches.length})`;
    document.querySelector('[data-filter="ALERTS"]').textContent=`🚨 Alerts (${allMatches.filter(m=>m.triggers.length>0||m.freeRec).length})`;
  }
}
fetchData();
setInterval(fetchData,60000);
updateNotifBtn();
</script>
